              <div className="w-full max-w-md bg-slate-900 border-2 border-amber-500 p-8 rounded-2xl shadow-2xl">
                <h3 className="text-amber-400 font-bold font-mono text-2xl uppercase mb-8 flex items-center gap-4"><Terminal size={28} className="animate-pulse" /> {t('lehrerCode')}</h3>
                <input type="password" value={code} onChange={(e) => setCode(e.target.value)} className="w-full p-4 bg-slate-950 border border-slate-700 rounded-xl text-lg font-bold text-amber-400 outline-none mb-8 focus:border-amber-500" placeholder="••••••" autoFocus />
                <div className="flex gap-4">
                  <button onClick={() => { onApplyCode(code); setCode(''); onClose(); }} className="flex-1 py-4 bg-amber-500 text-slate-950 rounded-xl font-bold uppercase">OK</button>
                  <button onClick={onClose} className="flex-1 py-4 bg-slate-800 text-white rounded-xl font-bold uppercase">X</button>
                </div>
              </div>
            </div>
          );
        };

        const WorksheetModal = ({ isOpen, onClose, children, t, waitTime = 15 }) => {
          const [timeLeft, setTimeLeft] = useState(waitTime);
          const [warning, setWarning] = useState(false);
          useEffect(() => {
            if (!isOpen) { setTimeLeft(waitTime); setWarning(false); return; }
            const timer = setInterval(() => setTimeLeft(p => p > 0 ? p - 1 : 0), 1000);
            return () => clearInterval(timer);
          }, [isOpen, waitTime]);
          if (!isOpen) return null;
          const handleClose = () => { if (timeLeft > 0) { setWarning(true); setTimeout(() => setWarning(false), 3000); } else onClose(); };
          return (
            <div className="fixed inset-0 z-[600] flex flex-col items-center justify-end p-4 md:p-8 bg-slate-950/20 pointer-events-none">
              <div className="w-full max-w-2xl bg-slate-900/95 border-2 border-rose-500 p-6 md:p-8 rounded-2xl shadow-[0_0_40px_rgba(244,63,94,0.3)] relative mb-4 pointer-events-auto">
                <button onClick={handleClose} className="absolute top-4 right-4 bg-slate-800 text-rose-500 border border-rose-500/50 w-12 h-12 rounded-xl font-bold text-2xl flex items-center justify-center">X</button>
                <div className="flex items-center gap-4 mb-6 pb-4 border-b border-slate-800 pr-12 text-rose-500">
                  <FileText size={32} /> <h3 className="font-bold font-mono text-2xl uppercase">{t('attentionAB')}</h3>
                </div>
                <div className="text-slate-100 text-lg mb-6 leading-relaxed">{children}</div>
                {warning && <div className="bg-amber-950/80 border border-amber-500 text-amber-400 p-4 rounded-xl font-bold text-center uppercase">{t('abWait')}</div>}
              </div>
            </div>
          );
        };

        const ScreenWrapper = ({ children, title, onBack, agentNames, t, onLangToggle, lang, view, onTeacherCode, modal }) => {
          const [isTeacherModalOpen, setIsTeacherModalOpen] = useState(false);
          useEffect(() => { window.scrollTo({ top: 0, behavior: 'smooth' }); }, [view, title]);
          return (
            <div className="min-h-screen text-slate-100 p-6 flex flex-col items-center pb-24 relative overflow-x-hidden">
              <Background />
              <TeacherModal isOpen={isTeacherModalOpen} onClose={() => setIsTeacherModalOpen(false)} t={t} onApplyCode={onTeacherCode} />
              {modal}
              <div className="w-full max-w-5xl relative z-10 flex flex-col gap-8">
                <div className="flex flex-col md:flex-row gap-6 items-center justify-between border-b border-cyan-500/30 pb-6">
                  <div className="flex items-center gap-4">
                    {onBack && <button onClick={onBack} className="bg-slate-900 border border-cyan-500/50 p-4 rounded-xl active:scale-95 transition-colors hover:bg-slate-800 focus:outline-none"><ArrowLeft size={28} className="text-cyan-400" /></button>}
                    <div className="bg-slate-900 border border-emerald-500/50 p-4 rounded-xl cursor-pointer transition-colors hover:bg-slate-800 focus:outline-none" onClick={() => setIsTeacherModalOpen(true)}><Shield size={28} className="text-emerald-400" /></div>
                    <h1 className="text-2xl font-bold font-mono text-white uppercase break-words">{view === 'welcome' ? t('missionsLogin') : title}</h1>
                  </div>
                  <div className="flex items-center gap-4">
                    {agentNames && agentNames.length > 0 && agentNames[0] !== "" && (
                      <div className="flex gap-4">
                        {agentNames.map((n, i) => n && <div key={i} className={`px-4 py-3 rounded-xl border text-lg font-bold flex items-center gap-2 uppercase bg-slate-900 ${i === 0 ? 'border-emerald-500/70 text-emerald-400' : 'border-cyan-500/70 text-cyan-400'}`}><User size={20}/> {n}</div>)}
                      </div>
                    )}
                    <button onClick={onLangToggle} className="bg-slate-900 border border-indigo-500/50 px-6 py-3 rounded-xl text-indigo-400 font-bold flex items-center gap-3 transition-colors hover:bg-slate-800 focus:outline-none"><Globe size={24} /> {lang === 'de' ? 'RU' : 'DE'}</button>
                  </div>
                </div>
                <GameBox className="p-8 min-h-[60vh] flex flex-col">{children}</GameBox>
              </div>
            </div>
          );
        };

        const Button = ({ onClick, children, variant = 'primary', disabled = false, className = "", icon: Icon }) => {
          const variants = {
            primary: "bg-gradient-to-r from-cyan-600 to-blue-600 text-white border-cyan-400",
            secondary: "bg-gradient-to-r from-slate-800 to-slate-700 text-cyan-400 border-cyan-500/50",
            success: "bg-gradient-to-r from-emerald-600 to-teal-600 text-white border-emerald-400",
            danger: "bg-gradient-to-r from-rose-600 to-pink-600 text-white border-rose-400",
          };
          return (
            <button onClick={onClick} disabled={disabled} className={`w-full py-4 px-6 rounded-xl font-bold text-lg flex items-center justify-center gap-3 uppercase active:scale-95 disabled:opacity-50 shadow-lg border focus:outline-none transition-all ${variants[variant]} ${className}`}>
              {Icon && <Icon size={24} />} {children}
            </button>
          );
        };

        const InfoCard = ({ children, title, t }) => (
          <div className="bg-slate-900/95 p-8 rounded-2xl border border-cyan-500/50 mb-8 text-slate-100 relative shadow-[0_0_20px_rgba(6,182,212,0.1)]">
            <div className="absolute top-0 right-6 bg-cyan-950 text-cyan-400 font-bold font-mono px-4 py-1 rounded-b-lg border-x border-b border-cyan-500/50 uppercase flex items-center gap-2">{t('infoTitle')} <Info size={20} /></div>
            <h3 className="text-cyan-400 font-bold font-mono mb-6 uppercase text-2xl border-b border-cyan-500/30 pb-4 mt-2">{title}</h3>
            <div className="text-lg leading-relaxed space-y-4">{children}</div>
          </div>
        );

        // --- Screens ---
        const SetupScreen = ({ onStart, t, onLangToggle, lang, onTeacherCode }) => {
          const [step, setStep] = useState(1);
          const [mode, setMode] = useState(1);
          const [names, setNames] = useState(["", ""]);

          if (step === 1) {
            return (
              <ScreenWrapper view="welcome" t={t} lang={lang} onLangToggle={onLangToggle} onTeacherCode={onTeacherCode}>
                <div className="flex flex-col items-center text-center space-y-10 py-6">
                  <div className="bg-gradient-to-br from-cyan-900 to-slate-900 p-10 rounded-full border border-cyan-500/50 shadow-[0_0_30px_rgba(6,182,212,0.3)] animate-pulse"><Key size={56} className="text-cyan-400" /></div>
                  <h1 className="text-2xl font-bold font-mono text-white uppercase leading-snug">{t('mission')}<br/><span className="text-cyan-400">{t('securePassword')}</span></h1>
                  <GameBox color="bg-gradient-to-br from-slate-900 to-slate-950" className="p-8 max-w-4xl border-emerald-500/50 w-full">
                    <div className="flex items-center gap-4 mb-6 border-b border-emerald-500/30 pb-4"><div className="text-emerald-400"><UserCheck size={28} /></div><h2 className="text-2xl font-bold font-mono text-emerald-400 uppercase">{t('euerAuftrag')}</h2></div>
                    <div className="text-lg text-slate-200 text-left space-y-4"><p>{t('welcome_p1')}</p><p>{t('welcome_p2')}</p><p>{t('welcome_p3')}</p></div>
                  </GameBox>
                  <div className="w-full max-w-4xl space-y-6 pt-6 border-t border-slate-700/80">
                    <h3 className="text-slate-400 font-bold font-mono uppercase text-2xl">{t('playerCount')}</h3>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                      <Button onClick={() => { setMode(1); setStep(2); }} variant="secondary" icon={User}>{t('onePlayer')}</Button>
                      <Button onClick={() => { setMode(2); setStep(2); }} variant="success" icon={Users}>{t('twoPlayers')}</Button>
                    </div>
                  </div>
                </div>
              </ScreenWrapper>
            );
          }
          return (
            <ScreenWrapper title={mode === 1 ? t('decknameSingle') : t('decknamen')} onBack={() => setStep(1)} t={t} lang={lang} onLangToggle={onLangToggle} onTeacherCode={onTeacherCode}>
              <div className="max-w-3xl mx-auto w-full space-y-10 py-6">
                <div className="text-center space-y-6 border-b border-cyan-500/50 pb-8">
                  <Fingerprint size={56} className="text-cyan-400 mx-auto mb-6" />
                  <h2 className="text-2xl font-bold font-mono text-cyan-400 uppercase">{mode === 1 ? t('decknameSingle') : t('decknamen')}</h2>
                  <p className="text-slate-200 text-lg">{mode === 1 ? t('decknameSingleHint') : t('nameHint')}</p>
                </div>
                <div className="space-y-6">
                  {[...Array(mode)].map((_, i) => (
                    <div key={i} className={`bg-gradient-to-br from-slate-900 to-slate-950 p-8 rounded-2xl border shadow-xl ${i === 0 ? 'border-emerald-500/70' : 'border-cyan-500/70'}`}>
                      <label className={`font-bold font-mono uppercase text-lg mb-4 block ${i === 0 ? 'text-emerald-400' : 'text-cyan-400'}`}>{t('agent')} {i + 1}</label>
                      <div className="flex gap-4">
                        <input type="text" value={names[i]} onChange={(e) => { let n = [...names]; n[i] = e.target.value; setNames(n); }} placeholder={t('enterName')} className="flex-1 bg-slate-950 border border-slate-700 rounded-xl px-6 py-4 text-lg font-bold text-white outline-none focus:border-amber-500" />
                        <button onClick={() => { let n = [...names]; n[i] = FUNNY_NAMES_LIST_DE[Math.floor(Math.random() * FUNNY_NAMES_LIST_DE.length)]; setNames(n); }} className="bg-amber-600 p-4 rounded-xl text-slate-950 hover:bg-amber-500 transition-colors focus:outline-none"><Dices size={28} /></button>
                      </div>
                    </div>
                  ))}
                </div>
                <Button onClick={() => onStart(mode, names)} variant="primary" icon={Rocket} className="mt-8">{t('startMission')}</Button>
              </div>
            </ScreenWrapper>
          );
        };

        const OverviewScreen = ({ maxUnlocked, onSelectLevel, agentNames, t, lang, onLangToggle, onTeacherCode }) => {
          const levels = [
            { id: 1, key: "l1_title", color: "border-cyan-500/70" },
            { id: 2, key: "l2_title", color: "border-emerald-500/70" },
            { id: 3, key: "l3_title", color: "border-fuchsia-500/70" },
            { id: 4, key: "l4_title", color: "border-amber-500/70" },
            { id: 5, key: "l5_title", color: "border-rose-500/70" }
          ];
          
          // Zeige Akte 4 und 5 erst an, wenn Akte 3 komplett abgeschlossen wurde (maxUnlocked >= 4)
          const visibleLevels = levels.filter(l => l.id <= 3 || maxUnlocked >= 4);

          return (
            <ScreenWrapper title={t('hauptmenü')} agentNames={agentNames} t={t} lang={lang} onLangToggle={onLangToggle} onTeacherCode={onTeacherCode} view="overview">
              <div className="bg-cyan-900/40 p-6 rounded-2xl border border-cyan-500/50 mb-8 text-center shadow-lg"><p className="font-bold font-mono text-cyan-400 text-lg uppercase">{t('akteWählen')}</p></div>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                {visibleLevels.map(l => {
                  const isUnlocked = l.id <= maxUnlocked;
                  const isNext = l.id === maxUnlocked;
                  const fullTitle = t(l.key);
                  return (
                    <button key={l.id} onClick={() => isUnlocked && onSelectLevel(l.id)} className={`p-6 rounded-2xl border flex items-center justify-between transition-all relative focus:outline-none ${isUnlocked ? `bg-slate-900 hover:bg-slate-800 ${isNext ? 'next-level-glow' : l.color}` : 'bg-slate-950 border-slate-800 opacity-60 grayscale'}`}>
                      <div className="flex items-center gap-6 text-left flex-1 min-w-0 pr-4">
                        <div className={`w-16 h-16 rounded-xl flex items-center justify-center font-bold font-mono text-2xl border ${isUnlocked ? `border-current ${isNext ? 'bg-cyan-950 text-white' : 'bg-slate-950/80 text-slate-300'}` : 'border-slate-700 bg-slate-900 text-slate-500'}`}>{l.id}</div>
                        <div className="flex flex-col flex-1"><span className={`text-lg font-bold font-mono mb-1 uppercase ${isNext ? 'text-cyan-400' : 'text-slate-400'}`}>{t('akte')}</span><span className={`text-xl font-bold font-mono uppercase ${isNext ? 'text-white' : 'text-slate-200'}`}>{fullTitle.split(': ')[1] || fullTitle}</span></div>
                      </div>
                      {!isUnlocked ? <Lock size={32} className="text-slate-600" /> : <PlayCircle size={36} className={isNext ? 'text-cyan-400' : 'text-slate-400'} />}
                    </button>
                  );
                })}
              </div>
            </ScreenWrapper>
          );
        };

        // --- Level 1: Grundlagen ---
        const Level1 = ({ state, updateState, onBack, onComplete, agentNames, t, lang, onLangToggle, onTeacherCode }) => {
          const { 
             step = 0, 
             q1Done = false, 
             hackerStep = 0, 
             hackerDone = false, 
             lives = 3, 
             sortOrder = [4,1,3,2], 
             sortChecked = false, 
             analysisSelections = [], 
             analysisDone = false, 
             quizStep = 0, 
             showAB = false, 
             abDone = false, 
             feedback = "", 
             isError = false 
          } = state;
          
          const profiles = t('l1_profiles');
          const sortBase = { 2: { text: "passwort", time: t('l1_times').t2 }, 3: { text: "KatzeHund", time: t('l1_times').t4 }, 4: { text: "Sommer2024", time: t('l1_times').t1 }, 1: { text: "M!ss1on_P@ss", time: t('l1_times').t3 } };
          const sortCorrect = [2, 3, 4, 1];
          const sortPasswords = sortOrder.map(id => ({ id, ...sortBase[id] }));
          const isSorted = sortPasswords.every((p, i) => p.id === sortCorrect[i]);
          const analysisOpts = t('l1_opts');
          const quizQs = t('l1_qs');

          const [quizSel, setQuizSel] = useState(null);

          const handleQ1 = (idx) => {
            if (q1Done) return;
            if (idx === 0) {
              updateState({feedback: "Falsch! Passwörter haben keinen Einfluss auf die Geschwindigkeit des Internets.", isError: true});
            } else if (idx === 2) {
              updateState({feedback: "Falsch! Vor Viren schützt ein Antivirenprogramm, nicht ein Passwort.", isError: true});
            } else if (idx === 1) {
              updateState({q1Done: true, feedback: "", isError: false});
            }
          };

          const handleHack = (choice) => {
            if (hackerDone) return;
            if (choice === profiles[hackerStep].c) {
              if (hackerStep + 1 === profiles.length) {
                 updateState({ hackerDone: true, feedback: "", isError: false });
              } else {
                 updateState({ feedback: t('l1_fbRight'), isError: false });
                 setTimeout(() => {
                   updateState({ hackerStep: hackerStep + 1, feedback: "" });
                 }, 1500);
              }
            } else {
              updateState({ feedback: t('wrong'), isError: true });
              setTimeout(() => updateState({ feedback: "" }), 1500);
            }
          };

          const moveSort = (idx, dir) => {
            let n = [...sortOrder]; let target = idx + dir;
            if (target < 0 || target >= n.length) return;
            [n[idx], n[target]] = [n[target], n[idx]];
            updateState({ sortOrder: n, sortChecked: false, feedback: "" });
          };
          
          const checkSort = () => {
             updateState({ sortChecked: true });
             if (!isSorted) {
                 updateState({ feedback: "FALSCHE REIHENFOLGE! Sortiere nochmal.", isError: true });
             } else {
                 updateState({ feedback: "", isError: false });
             }
          };

          const checkAnalysis = () => {
            const correctIds = analysisOpts.filter(x => x.c).map(x => x.id);
            const isCorrect = analysisSelections.length === correctIds.length && analysisSelections.every(x => correctIds.includes(x));
            if (isCorrect) {
                updateState({ analysisDone: true, feedback: "", isError: false });
            } else {
                updateState({ feedback: t('l1_analysisWrong'), isError: true });
            }
          };

          const handleQuiz = (idx, isCorrect) => {
            setQuizSel(idx);
            if (isCorrect) {
              updateState({ feedback: t('correct'), isError: false });
              setTimeout(() => {
                setQuizSel(null);
                if (quizStep + 1 === quizQs.length) {
                   updateState({ showAB: true });
                }
                else updateState({ quizStep: quizStep + 1, feedback: "" });
              }, 1500);
            } else {
              updateState({ feedback: t('wrong'), isError: true });
              setTimeout(() => { updateState({ feedback: "" }); setQuizSel(null); }, 1500);
            }
          };

          return (
            <ScreenWrapper title={t('l1_title')} onBack={onBack} agentNames={agentNames} t={t} lang={lang} onLangToggle={onLangToggle} onTeacherCode={onTeacherCode} modal={<WorksheetModal isOpen={showAB} onClose={() => updateState({ showAB: false, abDone: true })} t={t}>{t('l1_ab')}</WorksheetModal>}>
              <div className="space-y-8 max-w-4xl mx-auto w-full">
                
                {/* Step 0: Grundlagen & Frage 1 */}
                {step === 0 && (
                  <div className="space-y-8 animate-fade-in">
                    <InfoCard title="Grundlagen" t={t}>
                      <p>{t('l1_p1_1')}</p>
                    </InfoCard>
                    <div className="bg-slate-900 p-8 rounded-2xl border border-slate-700 shadow-xl relative">
                      <p className="font-bold text-xl mb-6">{t('l1_q1')}</p>
                      <div className="space-y-4">
                        <button onClick={() => handleQ1(0)} className={`w-full p-6 border rounded-xl text-left transition-colors focus:outline-none ${q1Done ? 'bg-slate-950 border-slate-800 opacity-50' : 'bg-slate-950 border-slate-700 hover:bg-slate-800'}`}>{t('l1_a1')}</button>
                        <button onClick={() => handleQ1(1)} className={`w-full p-6 border rounded-xl text-left transition-colors focus:outline-none ${q1Done ? 'bg-emerald-900/50 border-emerald-500 text-emerald-100' : 'bg-slate-950 border-slate-700 hover:bg-slate-800'}`}>{t('l1_a2')}</button>
                        <button onClick={() => handleQ1(2)} className={`w-full p-6 border rounded-xl text-left transition-colors focus:outline-none ${q1Done ? 'bg-slate-950 border-slate-800 opacity-50' : 'bg-slate-950 border-slate-700 hover:bg-slate-800'}`}>{t('l1_a3')}</button>
                      </div>
                      
                      {feedback && !q1Done && <div className="mt-6 p-4 text-center font-bold font-mono text-xl text-rose-400 bg-rose-950/50 rounded-xl border border-rose-500/50 uppercase">{feedback}</div>}
                      
                      {q1Done && (
                        <div className="mt-8 p-6 bg-emerald-900/80 border border-emerald-500 rounded-xl shadow-lg text-center animate-fade-in">
                           <p className="text-emerald-300 font-bold font-mono text-2xl uppercase mb-2">{t('l1_success1_head')}</p>
                           <p className="text-emerald-100 text-lg">{t('l1_success1_sub')}</p>
                           <Button onClick={() => { updateState({ step: 1, feedback: "", isError: false }); window.scrollTo({ top: 0, behavior: 'smooth' }); }} className="mt-6" variant="success">{t('next')}</Button>
                        </div>
                      )}
                    </div>
                  </div>
                )}

                {/* Step 1: Schwache Passwörter & Hacker Game */}
                {step === 1 && (
                  <div className="space-y-8 animate-fade-in">
                    <InfoCard title="Schwache Passwörter" t={t}>
                      <p>{t('l1_p2_1')}</p>
                    </InfoCard>
                    <div className="bg-slate-900 p-8 rounded-2xl border border-slate-700 shadow-xl">
                      <SectionTitle icon={Target} color="text-rose-400" title="Hacker-Angriff" />
                      
                      <p className="font-bold text-xl mb-6 text-center text-slate-200">{t('l1_hackPrompt')}</p>
                      
                      {!hackerDone && (
                        <>
                          <div className="bg-cyan-950/30 p-8 rounded-xl border border-cyan-500/50 mb-8 relative shadow-inner">
                            <p className="text-cyan-400 text-lg font-bold font-mono absolute top-[-14px] left-6 bg-slate-900 px-3 border border-cyan-500/30 rounded">{t('l1_profile')}</p>
                            <p className="text-2xl font-bold font-mono text-white mb-2 pt-2 uppercase">{profiles[hackerStep].name}</p>
                            <p className="text-lg text-slate-200 border-l-4 border-cyan-500/50 pl-4">{profiles[hackerStep].info}</p>
                          </div>
                          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            {profiles[hackerStep].opts.map(o => <button key={o} onClick={() => handleHack(o)} className="p-6 bg-slate-800 hover:bg-slate-700 border border-slate-600 rounded-xl font-bold font-mono text-lg text-white shadow-sm focus:outline-none transition-colors">{o}</button>)}
                          </div>
                        </>
                      )}

                      {feedback && !hackerDone && <div className={`mt-8 p-6 rounded-xl border text-center font-bold font-mono text-2xl uppercase ${isError ? 'bg-rose-900/80 text-rose-300 border-rose-500' : 'bg-emerald-900/80 text-emerald-300 border-emerald-500'}`}>{feedback}</div>}
                      
                      {hackerDone && (
                        <div className="mt-4 p-6 bg-emerald-900/80 border border-emerald-500 rounded-xl shadow-lg text-center animate-fade-in">
                           <p className="text-emerald-300 font-bold font-mono text-2xl uppercase mb-2">{t('l1_success2_head')}</p>
                           <p className="text-emerald-100 text-lg leading-relaxed">{t('l1_success2_sub')}</p>
                           <Button onClick={() => { updateState({ step: 2, feedback: "", isError: false }); window.scrollTo({ top: 0, behavior: 'smooth' }); }} className="mt-6" variant="success">{t('next')}</Button>
                        </div>
                      )}
                    </div>
                  </div>
                )}

                {/* Step 2: Hackerprogramme, Sort Game & Analysis */}
                {step === 2 && (
                  <div className="space-y-8 animate-fade-in">
                    <InfoCard title="Hackerprogramme" t={t}>
                        <p>{t('l1_hackTransition')}</p>
                        <p className="mt-4">{t('l1_p3_1')}</p>
                    </InfoCard>
                    
                    <div className="bg-slate-900 p-8 rounded-2xl border border-slate-700 shadow-xl">
                      <SectionTitle icon={Target} color="text-amber-400" title={t('l1_sortTitle')} />
                      <p className="font-bold text-xl mb-6">{t('l1_sortSub')}</p>
                      
                      <div className="bg-rose-950/50 p-3 rounded-xl text-center font-bold font-mono uppercase mb-6 border border-rose-500/50 text-rose-400">⬆️ {t('l1_weak')} ⬆️</div>
                      <div className="space-y-4">
                        {sortPasswords.map((p, i) => {
                          const isCorrectPos = sortChecked && p.id === sortCorrect[i];
                          const isWrongPos = sortChecked && p.id !== sortCorrect[i];
                          return (
                            <div key={p.id} className={`p-4 md:p-6 border rounded-xl flex justify-between items-center transition-all shadow-sm ${isCorrectPos ? 'bg-emerald-900/80 border-emerald-500 text-emerald-100' : isWrongPos ? 'bg-rose-900/80 border-rose-500 text-rose-100' : 'bg-slate-800 border-slate-700'}`}>
                              <div className="flex flex-col min-w-0 flex-1 pr-4">
                                <p className="font-bold font-mono text-xl md:text-2xl tracking-widest break-all">{p.text}</p>
                                {isSorted && sortChecked && <p className="text-slate-300 font-normal text-lg mt-1 flex items-center gap-2 animate-fade-in"><Lock size={18}/> {t('l1_time')} <span className="text-cyan-300 font-bold">{p.time}</span></p>}
                              </div>
                              <div className="flex gap-2 flex-shrink-0">
                                <button onClick={() => moveSort(i, -1)} disabled={i === 0 || sortChecked} className="p-3 bg-slate-700 hover:bg-slate-600 rounded-xl disabled:opacity-30 transition-opacity focus:outline-none"><ArrowUp size={24} className="text-white"/></button>
                                <button onClick={() => moveSort(i, 1)} disabled={i === sortPasswords.length - 1 || sortChecked} className="p-3 bg-slate-700 hover:bg-slate-600 rounded-xl disabled:opacity-30 transition-opacity focus:outline-none"><ArrowDown size={24} className="text-white"/></button>
                              </div>
                            </div>
                          );
                        })}
                      </div>
                      <div className="bg-emerald-950/50 p-3 rounded-xl text-center font-bold font-mono uppercase mt-6 border border-emerald-500/50 text-emerald-400">⬇️ {t('l1_strong')} ⬇️</div>
                      
                      {!sortChecked ? (
                         <Button onClick={checkSort} className="mt-8" variant="primary">{t('check')}</Button>
                      ) : !isSorted ? (
                         <div className="mt-8 space-y-6">
                            <div className="p-6 bg-rose-900/80 border border-rose-500 rounded-xl text-rose-300 font-bold font-mono text-xl text-center uppercase shadow-md">{feedback}</div>
                            <Button onClick={() => updateState({ sortChecked: false, feedback: "", isError: false })} variant="secondary">{t('tryAgain')}</Button>
                         </div>
                      ) : (
                         <div className="mt-8 p-6 bg-emerald-900/80 border border-emerald-500 rounded-xl shadow-lg text-center animate-fade-in">
                            <p className="text-emerald-300 font-bold font-mono text-2xl uppercase mb-2">{t('l1_sortSuccess_head')}</p>
                            <p className="text-emerald-100 text-lg leading-relaxed">{t('l1_sortSuccess_sub')}</p>
                         </div>
                      )}
                    </div>

                    {isSorted && sortChecked && (
                      <div className="bg-slate-900 p-8 rounded-2xl border border-cyan-500/50 shadow-xl mt-8 animate-fade-in">
                        <SectionTitle icon={Search} color="text-cyan-400" title={t('l1_analysisTitle')} />
                        <p className="font-bold text-xl mb-6">{t('l1_analysisSub')}</p>
                        <p className="text-center font-bold font-mono text-3xl md:text-4xl text-white bg-slate-950 p-6 rounded-xl border border-slate-700 mb-8 tracking-widest shadow-inner">M!ss1on_P@ss</p>
                        <div className="space-y-4">
                          {analysisOpts.map(o => {
                             const isSel = analysisSelections.includes(o.id);
                             return (
                               <button key={o.id} onClick={() => { if(!analysisDone) { let s = isSel ? analysisSelections.filter(x => x !== o.id) : [...analysisSelections, o.id]; updateState({ analysisSelections: s, feedback: "", isError: false }); } }} className={`w-full p-6 border rounded-xl text-left flex items-start gap-4 transition-colors focus:outline-none ${analysisDone && isSel ? 'bg-emerald-900/50 border-emerald-500' : isSel ? 'bg-cyan-900 border-cyan-500' : 'bg-slate-950 border-slate-700 hover:bg-slate-800'} ${analysisDone && !isSel ? 'opacity-50' : ''}`}>
                                 <div className={`w-8 h-8 rounded border flex items-center justify-center flex-shrink-0 mt-1 ${analysisDone && isSel ? 'border-emerald-400 bg-emerald-500 text-slate-900' : isSel ? 'border-cyan-400 bg-cyan-500 text-slate-900' : 'border-slate-500 bg-slate-800'}`}>{isSel && <Check size={20} className="font-bold" />}</div>
                                 <span className="text-lg leading-relaxed">{o.text}</span>
                               </button>
                             );
                          })}
                        </div>
                        
                        {!analysisDone && feedback && <div className="mt-8 p-6 bg-rose-900/80 border border-rose-500 rounded-xl text-rose-300 font-bold font-mono text-xl text-center uppercase shadow-md">{feedback}</div>}
                        
                        {!analysisDone ? (
                           <Button onClick={checkAnalysis} className="mt-8" variant="primary">{t('check')}</Button>
                        ) : (
                           <div className="mt-8 p-6 bg-emerald-900/80 border border-emerald-500 rounded-xl shadow-lg text-center animate-fade-in">
                             <p className="text-emerald-300 font-bold font-mono text-2xl uppercase mb-2">{t('l1_analysisRight_head')}</p>
                             <p className="text-emerald-100 text-lg">{t('l1_analysisRight_sub')}</p>
                             <Button onClick={() => { updateState({ step: 3, feedback: "", isError: false }); window.scrollTo({ top: 0, behavior: 'smooth' }); }} className="mt-6" variant="success">{t('next')}</Button>
                           </div>
                        )}
                      </div>
                    )}
                  </div>
                )}

                {/* Step 3: Summary & Quiz */}
                {step === 3 && !abDone && (
                  <div className="space-y-8 animate-fade-in">
                    <InfoCard title={t('l1_summaryHead')} t={t}>
                      <ul className="space-y-4 bg-slate-950 p-8 rounded-xl border border-cyan-500/30 text-left">
                        <li className="flex gap-4"><CheckCircle className="text-emerald-400 mt-1 flex-shrink-0"/> <span className="leading-relaxed text-lg">{t('l1_li1')}</span></li>
                        <li className="flex gap-4"><CheckCircle className="text-emerald-400 mt-1 flex-shrink-0"/> <span className="leading-relaxed text-lg">{t('l1_li2')}</span></li>
                        <li className="flex gap-4"><CheckCircle className="text-emerald-400 mt-1 flex-shrink-0"/> <span className="leading-relaxed text-lg">{t('l1_li3')}</span></li>
                        <li className="flex gap-4"><CheckCircle className="text-emerald-400 mt-1 flex-shrink-0"/> <span className="leading-relaxed text-lg">{t('l1_li4')}</span></li>
                        <li className="flex gap-4"><CheckCircle className="text-emerald-400 mt-1 flex-shrink-0"/> <span className="leading-relaxed text-lg">{t('l1_li5')}</span></li>
                      </ul>
                    </InfoCard>
                    
                    <div className="bg-slate-900 p-8 rounded-2xl border border-slate-700 shadow-xl animate-fade-in">
                      <SectionTitle icon={HelpCircle} color="text-amber-400" title={t('quizTitle')}><span className="ml-2 text-amber-400">{quizStep + 1}/{quizQs.length}</span></SectionTitle>
                      <div className="font-bold text-2xl mb-8 leading-relaxed">{quizQs[quizStep].q}</div>
                      <div className="space-y-4">
                        {quizQs[quizStep].opts.map((o, i) => {
                          const isSelected = quizSel === i;
                          const isCorrect = isSelected && o.c;
                          const isWrong = isSelected && !o.c;
                          return (
                            <button key={i} disabled={quizSel !== null && o.c} onClick={() => handleQuiz(i, o.c)} className={`w-full p-6 border rounded-xl text-left text-lg transition-colors shadow-sm leading-relaxed focus:outline-none ${isCorrect ? 'bg-emerald-900/80 border-emerald-500 text-emerald-300' : isWrong ? 'bg-rose-900/80 border-rose-500 text-rose-300' : 'bg-slate-950 hover:bg-slate-800 border-slate-600'}`}>{o.t}</button>
                          );
                        })}
                      </div>
                      {feedback && <div className={`mt-8 p-6 rounded-xl border text-center font-bold font-mono text-2xl uppercase shadow-md ${isError ? 'bg-rose-900/80 border-rose-500 text-rose-300' : 'bg-emerald-900/80 border-emerald-500 text-emerald-300'}`}>{feedback}</div>}
                    </div>
                  </div>
                )}

                {/* Abschluss nach Arbeitsblatt */}
                {abDone && (
                  <div className="space-y-8 text-center animate-fade-in">
                    <div className="p-10 bg-emerald-900/80 border border-emerald-500 rounded-2xl text-emerald-300 font-bold font-mono text-2xl md:text-3xl uppercase tracking-widest shadow-xl">SYSTEM-CHECK BESTANDEN! AKTE 1 ABGESCHLOSSEN.</div>
                    <Button onClick={onComplete} variant="success" icon={Lock} className="mt-8">{t('finish')}</Button>
                  </div>
                )}

              </div>
            </ScreenWrapper>
          );
        };

        // --- Spezielle Matching Component für Level 2 ---
        const MatchingGame = ({ pairs, isCompleted, onComplete }) => {
          const [leftItems, setLeftItems] = useState([]);
          const [rightItems, setRightItems] = useState([]);
          const [selL, setSelL] = useState(null);
          const [selR, setSelR] = useState(null);
          const [matched, setMatched] = useState([]);
          const [error, setError] = useState(false);

          useEffect(() => {
            // Links normal
            setLeftItems([...pairs].map(p => ({ id: p.id, text: p.l })));
            // Rechts um eine Position verschoben, damit sie anfangs nicht direkt nebeneinander stehen
            setRightItems([...pairs].map((p, i, arr) => ({ id: arr[(i + 1) % arr.length].id, text: arr[(i + 1) % arr.length].r })));
          }, [pairs]);

          useEffect(() => {
             if (isCompleted) {
                 setMatched(pairs.map(p => p.id));
             }
          }, [isCompleted, pairs]);

          useEffect(() => {
            if (selL !== null && selR !== null) {
              if (selL === selR) {
                setMatched(m => [...m, selL]);
                setSelL(null); setSelR(null);
                if (matched.length + 1 === pairs.length) setTimeout(onComplete, 1000);
              } else {
                setError(true);
                setTimeout(() => { setError(false); setSelL(null); setSelR(null); }, 800);
              }
            }
          }, [selL, selR]);

          return (
            <div className="space-y-6">
              <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div className="space-y-4">
                  {leftItems.map(i => {
                    const isM = matched.includes(i.id);
                    const isS = selL === i.id;
                    const isErr = isS && error;
                    return <button key={`l-${i.id}`} onClick={() => !isM && setSelL(i.id)} disabled={isM || isCompleted} className={`w-full p-4 border rounded-xl font-bold text-left text-lg transition-all shadow-sm focus:outline-none ${isM ? 'bg-emerald-900/50 border-emerald-500/50 text-emerald-500/50 opacity-50' : isErr ? 'bg-rose-900 border-rose-500 text-rose-300' : isS ? 'bg-cyan-900 border-cyan-400 text-cyan-100' : 'bg-slate-800 border-slate-600 text-white hover:bg-slate-700'}`}>{i.text}</button>
                  })}
                </div>
                <div className="space-y-4">
                  {rightItems.map(i => {
                    const isM = matched.includes(i.id);
                    const isS = selR === i.id;
                    const isErr = isS && error;
                    return <button key={`r-${i.id}`} onClick={() => !isM && setSelR(i.id)} disabled={isM || isCompleted} className={`w-full p-4 border rounded-xl font-bold font-mono text-center text-xl tracking-widest transition-all shadow-sm focus:outline-none ${isM ? 'bg-emerald-900/50 border-emerald-500/50 text-emerald-500/50 opacity-50' : isErr ? 'bg-rose-900 border-rose-500 text-rose-300' : isS ? 'bg-cyan-900 border-cyan-400 text-cyan-100' : 'bg-slate-800 border-slate-600 text-cyan-400 hover:bg-slate-700'}`}>{i.text}</button>
                  })}
                </div>
              </div>
            </div>
          );
        };

        // --- Level 2: Tricks komplett neu strukturiert ---
        const Level2 = ({ state, updateState, onBack, onComplete, agentNames, t, lang, onLangToggle, onTeacherCode }) => {
          const { trickIdx = 0, activeTaskIdx = 0, abState = 'hidden' } = state;
          
          const [inputVal, setInputVal] = useState("");
          const [feedback, setFeedback] = useState("");
          const [isError, setIsError] = useState(false);
          const [failCount, setFailCount] = useState(0);
          const [selectedOpt, setSelectedOpt] = useState(null);

          const tricksData = [
            {
              trickNum: 1, title: t('l2_t1'), ab: null,
              tasks: [
                { id: 't1_1', type: 'sc', q: "Finde das korrekte Passwort für folgenden Satz:", txt: "Heute scheint die Sonne sehr hell!", opts: ["HsdsS!", "HeuteS!", "HsdSsh!", "HsdSsh."], c: "HsdSsh!" },
                { id: 't1_3', type: 'input', q: "Wandle nun selbst folgenden Satz um:", txt: "Wir lernen viel über sichere Passwörter!", c: "WlvüsP!", hint: "Achte genau auf die Groß- und Kleinschreibung der Anfangsbuchstaben und das Satzzeichen am Ende." }
              ]
            },
            {
              trickNum: 2, title: t('l2_t2'), ab: null,
              tasks: [
                { id: 't2_1', type: 'match', q: "Klicke links auf einen Satz und rechts auf das passende Passwort!", pairs: [ {id:1, l:"Am Abend esse ich eine Pizza!", r:"@@ei1P!"}, {id:2, l:"Am Anfang entdecke ich ein Problem.", r:"@@ei1P."}, {id:3, l:"Alle Affen essen im Park.", r:"@@eiP."} ] },
                { id: 't2_2', type: 'input', q: "Wandle den Satz mit Trick 1 und 2 um:", txt: "Mein Bruder isst zwei Äpfel.", c: "MBi2Ä.", hint: "Ersetze das Wort 'zwei' durch die Ziffer 2." }
              ]
            },
            {
              trickNum: 3, title: t('l2_t3'), ab: null,
              tasks: [
                { id: 't3_1', type: 'match', q: "Klicke links auf einen Satz und rechts auf das passende Passwort!", pairs: [ {id:1, l:"Wir spielen heute im Park! (Roblox _RB)", r:"WshiP!_RB"}, {id:2, l:"Wir singen heute im Park. (Roblox _RB)", r:"WshiP._RB"}, {id:3, l:"Wann starten wir im Projekt? (Minecraft _MC)", r:"WswiP?_MC"} ] }
              ]
            },
            {
              trickNum: 'summary', isSummary: true, title: "Zusammenfassung", ab: 'summary',
              tasks: []
            },
            {
              trickNum: 4, isProfi: true, title: "Sicherheits-Check", ab: null,
              tasks: [
                { id: 't4_1', type: 'input', q: "Wandle den Satz mithilfe von Trick 1, 2 und 3 in ein sicheres Passwort um:", txt: "Am Abend spiele ich für zwei Stunden. (Roblox _RB)", c: "@@si42S._RB", hint: "Denke an: @@ für Am Abend, 4 für für, 2 für zwei, den Punkt und das Kürzel _RB!" },
                { id: 't4_2', type: 'input', q: "Wandle noch diesen Satz um (alle Tricks anwenden):", txt: "Zwei Hunde bellen laut im Park! (TikTok _TT)", c: "2HbliP!_TT", hint: "Denke an: 2 für Zwei, die Anfangsbuchstaben, das Ausrufezeichen und das Kürzel _TT!" }
              ]
            }
          ];

          const currentTrick = tricksData[trickIdx];

          const renderInfoBox = (trick) => {
            if (trick.trickNum === 1) return (
               <InfoCard title={`Trick 1: ${t('l2_t1')}`} t={t}>
                   <p>{t('l2_t1_p1')}</p>
                   <p className="mt-4">{t('l2_t1_p2')}</p>
                   <p className="mt-6 font-bold font-mono text-cyan-400 bg-cyan-950/80 border-l-4 border-cyan-500 p-4 rounded-r-xl">{t('l2_ex')} {t('l2_t1_ex')}</p>
               </InfoCard>
            );
            if (trick.trickNum === 2) return (
               <InfoCard title={`Trick 2: ${t('l2_t2')}`} t={t}>
                   <p>Als Ergänzung zu Trick 1 machen wir es Hackern noch schwerer: Wir streuen <Highlight>Zahlen und Sonderzeichen</Highlight> ein.</p>
                   <p className="mt-4"><Highlight>Ersetzt</Highlight> dafür einfach bestimmte Wörter oder Buchstaben aus eurem Merksatz durch Ziffern und Symbole.</p>
                   <p className="mt-6 text-emerald-400 font-bold uppercase tracking-widest text-sm">Beispiele für mögliche Ersetzungen:</p>
                   <ul className="grid grid-cols-1 sm:grid-cols-2 gap-4 mt-2 text-emerald-400 font-bold font-mono">
                       <li className="bg-emerald-950/80 p-4 border-l-4 border-emerald-500 rounded-r-xl">{t('l2_t2_r1')}</li>
                       <li className="bg-emerald-950/80 p-4 border-l-4 border-emerald-500 rounded-r-xl">{t('l2_t2_r2')}</li>
                       <li className="bg-emerald-950/80 p-4 border-l-4 border-emerald-500 rounded-r-xl">{t('l2_t2_r3')}</li>
                       <li className="bg-emerald-950/80 p-4 border-l-4 border-emerald-500 rounded-r-xl">{t('l2_t2_r4')}</li>
                   </ul>
               </InfoCard>
            );
            if (trick.trickNum === 3) return (
               <InfoCard title={`Trick 3: ${t('l2_t3')}`} t={t}>
                   <p>Als Ergänzung zu Trick 1 und 2 gilt die goldene Regel: Nutzt <Highlight>für jeden Account ein eigenes Passwort</Highlight>!</p>
                   <p className="mt-4">Damit ihr euch nicht 20 verschiedene Sätze merken müsst, nutzt immer euren EINEN <Highlight>Basis-Merksatz</Highlight>. Hängt an das Ende einfach ein <Highlight>Kürzel für die jeweilige Plattform</Highlight> an.</p>
                   <p className="mt-6 font-bold font-mono text-cyan-400 bg-cyan-950/80 border-l-4 border-cyan-500 p-4 rounded-r-xl">{t('l2_ex')} {t('l2_t3_ex')}</p>
               </InfoCard>
            );
            return null;
          };

          const advanceTask = () => {
              const nextIdx = activeTaskIdx + 1;
              updateState({ activeTaskIdx: nextIdx });
              setInputVal('');
              setFeedback('');
              setSelectedOpt(null);
              setFailCount(0);
              if (nextIdx >= currentTrick.tasks.length && currentTrick.ab) {
                   setTimeout(() => updateState({ abState: 'modal' }), 500);
              }
          };

          const handleSCCheck = (task, o) => {
              setSelectedOpt(o);
              if (o === task.c) {
                  setFeedback(t('correct'));
                  setIsError(false);
                  setTimeout(() => advanceTask(), 1500);
              } else {
                  setFeedback(`${t('wrong')} Lies noch einmal genau, was in der Infobox steht.`);
                  setIsError(true);
                  setTimeout(() => { setFeedback(""); setSelectedOpt(null); }, 2000);
              }
          };

          const handleInputCheck = (task, val) => {
             if(val.trim() === task.c) {
                setFeedback(t('correct'));
                setIsError(false);
                setFailCount(0);
                setTimeout(() => advanceTask(), 1500);
             } else {
                const newFail = failCount + 1;
                setFailCount(newFail);
                setIsError(true);
                if(newFail === 1) {
                    setFeedback(`${t('wrong')} ${currentTrick.isProfi ? "Lies noch einmal genau in deinen Notizen auf dem Arbeitsblatt nach." : "Lies noch einmal genau, was in der Infobox steht."}`);
                } else if(newFail === 2) {
                    if (currentTrick.trickNum === 1) setFeedback(`${t('wrong')} Hast du auf Groß-/Kleinschreibung und die Satzzeichen geachtet?`);
                    else if (currentTrick.trickNum === 2) setFeedback(`${t('wrong')} Hast du auf Groß-/Kleinschreibung, die Satzzeichen und die möglichen Ersetzungen geachtet?`);
                    else setFeedback(`${t('wrong')} Hast du auf die Anfangsbuchstaben, Ersetzungen, Satzzeichen und den Anhang geachtet?`);
                } else {
                    setFeedback(`Tipp: ${task.hint}`);
                }
             }
          };

          const goToNextTrick = () => {
              if (trickIdx >= tricksData.length - 1) {
                  onComplete();
              } else {
                  const nextTrick = tricksData[trickIdx + 1];
                  updateState({ 
                      trickIdx: trickIdx + 1, 
                      activeTaskIdx: 0, 
                      abState: nextTrick.ab ? 'modal' : 'hidden' 
                  });
                  setInputVal('');
                  setFeedback('');
                  setSelectedOpt(null);
                  setIsError(false);
                  setFailCount(0);
              }
          };

          const isLastTrickBeforeProfi = currentTrick.trickNum === 3;
          const isSummary = currentTrick.isSummary;
          const btnText = currentTrick.isProfi ? t('finish') : (isSummary ? "Weiter zum Sicherheits-Check" : (isLastTrickBeforeProfi ? "Zusammenfassung" : "Weiter zum nächsten Trick"));

          return (
            <ScreenWrapper title={`${t('l2_title')} - ${currentTrick.title}`} onBack={onBack} agentNames={agentNames} t={t} lang={lang} onLangToggle={onLangToggle} onTeacherCode={onTeacherCode} modal={<WorksheetModal isOpen={abState === 'modal'} onClose={() => updateState({ abState: 'done' })} t={t}>{currentTrick.ab === 'summary' ? t('l2_ab_summary') : (currentTrick.ab ? t(`l2_ab_${currentTrick.ab}`) : '')}</WorksheetModal>}>
              <div className="space-y-8 max-w-4xl mx-auto w-full">
                
                {/* Infobox rendern, außer bei Profi-Check */}
                {!currentTrick.isProfi && !currentTrick.isSummary && renderInfoBox(currentTrick)}
                {currentTrick.isSummary && (
                    <div className="space-y-6">
                        {renderInfoBox({trickNum: 1})}
                        {renderInfoBox({trickNum: 2})}
                        {renderInfoBox({trickNum: 3})}
                    </div>
                )}
                {currentTrick.isProfi && <SectionTitle icon={Target} color="text-fuchsia-400" title={t('quizTitle')} />}

                {/* Aufgaben rendern */}
                {currentTrick.tasks.map((task, idx) => {
                    if (idx !== activeTaskIdx) return null; // Nur die aktive Aufgabe anzeigen
                    const isActive = idx === activeTaskIdx;
                    
                    return (
                       <div key={task.id} className="bg-slate-900 p-8 rounded-2xl border border-slate-700 shadow-xl mb-8 animate-fade-in transition-all">
                          {!currentTrick.isProfi && <SectionTitle icon={Target} color="text-amber-400" title={t('quizTitle')} />}
                          <p className="text-xl text-center mb-6 font-bold text-slate-300">{task.q}</p>
                          
                          {task.txt && <p className="text-2xl text-center font-bold mb-8 text-white bg-slate-950 p-4 rounded-xl border border-slate-700">{task.txt}</p>}
                          
                          {task.type === 'sc' && (
                              <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                 {task.opts.map(o => {
                                    const isSelected = selectedOpt === o;
                                    const isCorrect = isSelected && o === task.c;
                                    const isWrong = isSelected && o !== task.c;
                                    return (
                                       <button key={o} disabled={selectedOpt !== null && o === task.c} onClick={() => isActive && handleSCCheck(task, o)} className={`p-6 border rounded-xl font-bold font-mono text-xl tracking-widest transition-colors shadow-sm focus:outline-none ${isCorrect ? 'bg-emerald-900/80 border-emerald-500 text-emerald-300' : isWrong ? 'bg-rose-900/80 border-rose-500 text-rose-300' : 'bg-slate-950 hover:bg-slate-800 border-slate-600'}`}>{o}</button>
                                    );
                                 })}
                              </div>
                          )}
                          {task.type === 'input' && (
                              <input type="text" value={inputVal} onChange={e => setInputVal(e.target.value)} placeholder="Passwort eingeben..." className="w-full p-6 border rounded-xl font-bold font-mono text-2xl text-center outline-none tracking-widest transition-colors bg-slate-950 border-slate-600 text-cyan-300 focus:border-cyan-400" />
                          )}
                          {task.type === 'match' && (
                                <MatchingGame pairs={task.pairs} isCompleted={false} onComplete={() => {
                                    setFeedback(t('correct'));
                                    setTimeout(() => advanceTask(), 1500);
                                }} />
                          )}

                          {/* Einheitliches Feedback für alle Aufgabenarten */}
                          {isActive && feedback && (
                              <div className={`mt-8 p-6 rounded-xl border text-center font-bold font-mono text-xl md:text-2xl uppercase leading-relaxed shadow-md ${isError ? 'bg-rose-900/80 border-rose-500 text-rose-300' : 'bg-emerald-900/80 border-emerald-500 text-emerald-300'}`}>
                                  {feedback}
                              </div>
                          )}

                          {/* Passwort-Testen-Button nur für Eingabefelder anzeigen */}
                          {isActive && task.type === 'input' && feedback !== t('correct') && (
                              <Button className="mt-8" onClick={() => handleInputCheck(task, inputVal)} variant="primary">Passwort Testen</Button>
                          )}
                       </div>
                    )
                })}

                {/* Weiter-Button rendern, wenn alle Aufgaben des Tricks gelöst wurden */}
                {activeTaskIdx >= currentTrick.tasks.length && (
                   <div className="mt-8 animate-fade-in text-center max-w-sm mx-auto">
                      {abState === 'done' || !currentTrick.ab ? (
                          <Button onClick={goToNextTrick} variant="success" icon={currentTrick.isProfi ? Lock : ArrowRight}>
                              {btnText}
                          </Button>
                      ) : (
                          <Button onClick={() => updateState({ abState: 'modal' })} variant="primary" icon={FileText}>
                              Arbeitsblatt-Hinweis öffnen
                          </Button>
                      )}
                   </div>
                )}

              </div>
            </ScreenWrapper>
          );
        };

        // --- Level 3: Passwortmeister (Profi-Passwort) ---
        const Level3 = ({ onComplete, agentNames, t, lang, onLangToggle, onTeacherCode }) => (
          <ScreenWrapper title={t('l3_title')} agentNames={agentNames} t={t} lang={lang} onLangToggle={onLangToggle} onTeacherCode={onTeacherCode}>
            <div className="text-center space-y-10 max-w-4xl mx-auto py-6 w-full animate-fade-in">
              <Award size={80} className="text-cyan-400 mx-auto drop-shadow-lg" />
              <h2 className="text-2xl font-bold font-mono text-white uppercase tracking-widest break-words">{t('l3_head')}</h2>
              <p className="text-lg font-normal text-slate-200 pb-6 border-b border-slate-800 break-words">{t('l3_sub')}</p>
              
              <div className="bg-slate-900 p-8 rounded-2xl border border-rose-500/50 text-left space-y-8 shadow-xl relative overflow-hidden">
                <div className="absolute top-0 right-0 bg-rose-600 text-white font-bold font-mono px-4 py-1 rounded-bl-xl uppercase tracking-widest">{t('topSecret')}</div>
                <h3 className="text-2xl font-bold font-mono uppercase text-rose-400 flex items-center gap-4 mt-2"><ShieldAlert size={32}/> {t('l3_alert')}</h3>
                <p className="text-lg text-slate-100 leading-relaxed">{t('l3_p1')}</p>
                <ul className="list-decimal pl-8 space-y-4 text-lg text-slate-100 marker:text-rose-500 marker:font-bold">
                  <li>{t('l3_li1')}</li><li>{t('l3_li2')}</li><li>{t('l3_li3')}</li>
                </ul>
                <div className="bg-rose-950/50 p-6 rounded-xl text-rose-400 text-lg border border-rose-500/50 font-bold text-center uppercase tracking-widest shadow-md">{t('l3_warn')}</div>
              </div>
              <Button onClick={onComplete} variant="success" icon={Lock} className="mt-6">{t('finish')}</Button>
            </div>
          </ScreenWrapper>
        );

        // --- Akte 4: Bonus-Missionen (Manager, 2FA, Phishing) ---
        const BonusMissions = ({ state, updateState, onBack, onComplete, agentNames, t, lang, onLangToggle, onTeacherCode }) => {
          // subAkte: 0=Manager, 1=2FA, 2=Phishing
          const { subAkte = 0, step = 0, feedback = "", isError = false, flashRed = false, solved = false } = state;
          
          const handleAnsManager = (c) => {
            const qs = t('l4_qsM');
            if (c) {
              updateState({ feedback: t('correct'), isError: false });
              setTimeout(() => {
                if (step + 1 === qs.length) { updateState({ feedback: "", step: 0, subAkte: 1 }); window.scrollTo(0,0); }
                else updateState({ step: step + 1, feedback: "" });
              }, 1500);
            } else { updateState({ feedback: t('wrong'), isError: true }); setTimeout(() => updateState({ feedback: "" }), 1500); }
          };

          const handleAns2FA = (c) => {
            const qs = t('l4_qs2');
            if (c) {
              updateState({ feedback: t('correct'), isError: false });
              setTimeout(() => {
                if (step + 1 === qs.length) { updateState({ feedback: "", step: 0, subAkte: 2 }); window.scrollTo(0,0); }
                else updateState({ step: step + 1, feedback: "" });
              }, 1500);
            } else { updateState({ feedback: t('wrong'), isError: true }); setTimeout(() => updateState({ feedback: "" }), 1500); }
          };

          const emails = t('l4_emails');
          const handleChoicePhishing = (isPhish) => {
            if (isPhish === emails[step].phishing) {
              updateState({ feedback: t('correct'), isError: false });
              setTimeout(() => {
                if (step + 1 === emails.length) updateState({ feedback: t('l4_successP'), solved: true });
                else updateState({ step: step + 1, feedback: "" });
              }, 1500);
            } else { updateState({ feedback: t('l4_fbWrongP'), isError: true }); setTimeout(() => updateState({ feedback: "" }), 2000); }
          };
          const clickLinkP = () => {
            if (emails[step].phishing) { updateState({ flashRed: true, feedback: t('l4_fbAlarmP'), isError: true }); setTimeout(() => updateState({ flashRed: false }), 500); } 
            else updateState({ feedback: t('l4_fbLuckyP'), isError: false });
          };

          const renderManager = () => {
             const qs = t('l4_qsM');
             return (
               <div className="space-y-8 max-w-4xl mx-auto w-full animate-fade-in">
                 <InfoCard title={t('l4_infoHeadM')} t={t}>
                   <p>{t('l4_p1M')}</p>
                   <div className="grid grid-cols-1 sm:grid-cols-2 gap-6 mt-6">
                     <div className="bg-emerald-950/80 p-6 rounded-xl border border-emerald-500/50 text-slate-100 shadow-md"><span className="uppercase block mb-3 text-emerald-400 font-bold font-mono border-b border-emerald-500/30 pb-2">{t('l4_adv')}</span> {t('l4_advT')}</div>
                     <div className="bg-rose-950/80 p-6 rounded-xl border border-rose-500/50 text-slate-100 shadow-md"><span className="uppercase block mb-3 text-rose-400 font-bold font-mono border-b border-rose-500/30 pb-2">{t('l4_dis')}</span> {t('l4_disT')}</div>
                   </div>
                 </InfoCard>
                 <div className="bg-slate-900 p-8 rounded-2xl border border-slate-700 shadow-xl">
                   <SectionTitle icon={HelpCircle} color="text-amber-400" title={t('l4_exam')}><span className="ml-2">{step + 1}/3</span></SectionTitle>
                   <div className="font-bold text-xl mb-6">{qs[step].q}</div>
                   <div className="grid grid-cols-1 gap-4">
                     {qs[step].opts.map((o, i) => <button key={i} onClick={() => handleAnsManager(o.c)} className="p-6 bg-slate-950 hover:bg-slate-800 border border-slate-600 rounded-xl text-left text-lg transition-colors focus:outline-none">{o.t}</button>)}
                   </div>
                   {feedback && <div className={`mt-8 p-6 rounded-xl border text-center font-bold font-mono text-2xl uppercase tracking-widest shadow-md ${isError ? 'bg-rose-900/80 border-rose-500 text-rose-300' : 'bg-emerald-900/80 border-emerald-500 text-emerald-300'}`}>{feedback}</div>}
                 </div>
               </div>
             );
          };

          const render2FA = () => {
             const qs = t('l4_qs2');
             return (
               <div className="space-y-8 max-w-4xl mx-auto w-full animate-fade-in">
                 <InfoCard title={t('l4_infoHead2')} t={t}>
                   <p>{t('l4_p1_2')}</p><p className="mt-4">{t('l4_p2_2')}</p><p className="mt-4">{t('l4_p3_2')}</p>
                 </InfoCard>
                 <div className="bg-slate-900 p-8 rounded-2xl border border-slate-700 shadow-xl">
                   <SectionTitle icon={HelpCircle} color="text-amber-400" title={t('l4_exam')}><span className="ml-2">{step + 1}/3</span></SectionTitle>
                   <div className="font-bold text-xl mb-6">{qs[step].q}</div>
                   <div className="grid grid-cols-1 gap-4">
                     {qs[step].opts.map((o, i) => <button key={i} onClick={() => handleAns2FA(o.c)} className="p-6 bg-slate-950 hover:bg-slate-800 border border-slate-600 rounded-xl text-left text-lg transition-colors focus:outline-none">{o.t}</button>)}
                   </div>
                   {feedback && <div className={`mt-8 p-6 rounded-xl border text-center font-bold font-mono text-2xl uppercase tracking-widest shadow-md ${isError ? 'bg-rose-900/80 border-rose-500 text-rose-300' : 'bg-emerald-900/80 border-emerald-500 text-emerald-300'}`}>{feedback}</div>}
                 </div>
               </div>
             );
          };

          const renderPhishing = () => {
             return (
               <div className={`space-y-8 max-w-4xl mx-auto w-full animate-fade-in ${flashRed ? 'bg-rose-950' : ''} transition-colors duration-200 rounded-2xl`}>
                 <InfoCard title={t('l4_infoHeadP')} t={t}>
                   <p>{t('l4_p1P')}</p><p className="font-bold font-mono text-cyan-400 uppercase text-2xl mt-6">{t('l4_p2P')}</p>
                   <ul className="space-y-4 bg-slate-950 p-8 rounded-xl border border-cyan-500/30 text-lg mt-4">
                     <li>{t('l4_li1P')}</li><li>{t('l4_li2P')}</li><li>{t('l4_li3P')}</li>
                   </ul>
                 </InfoCard>
                 {!solved ? (
                   <div className="bg-slate-900 p-8 rounded-2xl border border-slate-700 relative z-10 shadow-xl">
                     <SectionTitle icon={Target} color="text-amber-400" title={t('l4_taskP')}><span className="ml-2">{step + 1}/3</span></SectionTitle>
                     <div className="bg-slate-950 p-8 rounded-xl border border-slate-700 shadow-inner mb-8 relative">
                       <div className="absolute top-4 right-4 text-lg font-bold font-mono text-slate-500 border border-slate-700 px-3 py-1 rounded hidden sm:block">{t('l4_inboxP')}</div>
                       <p className="border-b border-slate-800 pb-4 mb-6">{t('l4_fromP')} <span className="text-rose-400 select-all font-mono ml-2 break-all">{emails[step].sender}</span></p>
                       <p className="font-bold font-mono text-2xl mb-6 uppercase">{emails[step].subject}</p>
                       <p className="text-slate-200 text-lg mb-8">"{emails[step].body}"</p>
                       <button onClick={clickLinkP} className="w-full p-6 bg-slate-800 hover:bg-slate-700 border border-cyan-500/70 rounded-xl text-cyan-400 font-bold font-mono uppercase flex items-center justify-center gap-4 shadow-md tracking-widest focus:outline-none"><LinkIcon size={24}/> <span>{t('l4_linkP')}</span></button>
                     </div>
                     <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                       <Button onClick={() => handleChoicePhishing(true)} variant="danger">{t('l4_btnFake')}</Button>
                       <Button onClick={() => handleChoicePhishing(false)} variant="success">{t('l4_btnReal')}</Button>
                     </div>
                     {feedback && <div className={`mt-8 p-6 rounded-xl border text-center font-bold font-mono text-2xl uppercase tracking-widest shadow-md ${isError ? 'bg-rose-900/80 border-rose-500 text-rose-300' : 'bg-emerald-900/80 border-emerald-500 text-emerald-300'}`}>{feedback}</div>}
                   </div>
                 ) : (
                   <div className="space-y-8 text-center animate-fade-in">
                     <div className="p-10 bg-emerald-900/80 border border-emerald-500 rounded-2xl text-emerald-300 font-bold font-mono text-2xl uppercase tracking-widest shadow-xl">{t('l4_successP')}</div>
                     <Button onClick={onComplete} variant="success" icon={Lock}>{t('finish')}</Button>
                   </div>
                 )}
               </div>
             );
          };

          return (
            <ScreenWrapper title={t('l4_title')} onBack={onBack} agentNames={agentNames} t={t} lang={lang} onLangToggle={onLangToggle} onTeacherCode={onTeacherCode}>
               {subAkte === 0 && renderManager()}
               {subAkte === 1 && render2FA()}
               {subAkte === 2 && renderPhishing()}
            </ScreenWrapper>
          );
        };

        // --- Level 5: Minigame (System Defender) ---
        const Minigame = ({ onBack, agentNames, t, lang, onLangToggle, onTeacherCode }) => {
          const [playing, setPlaying] = useState(false);
          const [setup, setSetup] = useState(true);
          const [countdown, setCountdown] = useState(null);
          const [score, setScore] = useState([0, 0]);
          const [lives, setLives] = useState([3, 3]);
          const [items, setItems] = useState([[], []]);
          const [time, setTime] = useState(0);
          const [mode, setMode] = useState('single');
          const [swappedSides, setSwappedSides] = useState(false);
          const [flash, setFlash] = useState([false, false]);

          const timeRef = useRef(0);
          const isPausedRef = useRef(false);
          
          const p1Name = swappedSides ? agentNames[1] : agentNames[0];
          const p2Name = swappedSides ? agentNames[0] : agentNames[1];

          useEffect(() => {
            if (countdown === null) return;
            if (countdown > 0) { const timer = setTimeout(() => setCountdown(countdown - 1), 1000); return () => clearTimeout(timer); } 
            else { setPlaying(true); setCountdown(null); }
          }, [countdown]);

          const triggerMistake = (lane) => {
            isPausedRef.current = true;
            setFlash(prev => { let n = [...prev]; n[lane] = true; return n; });
            setTimeout(() => { isPausedRef.current = false; setFlash([false, false]); }, 400); 
          };

          useEffect(() => {
            if (!playing) return;
            const timer = setInterval(() => { if(!isPausedRef.current) { timeRef.current += 1; setTime(timeRef.current); } }, 1000);
            const loop = setInterval(() => {
              if(isPausedRef.current) return;
              setItems(prev => prev.map((lane, lIdx) => lane.map(i => ({...i, y: i.y + i.speed})).filter(i => {
                if (i.y > 105) { if (i.isWeak) { setLives(lv => { let nl = [...lv]; nl[lIdx] -= 1; return nl; }); triggerMistake(lIdx); } return false; }
                return true;
              })));
            }, 50);
            return () => { clearInterval(timer); clearInterval(loop); };
          }, [playing]);

          useEffect(() => {
            if (!playing) return;
            let spawnTimeout;
            const spawn = () => {
              if(isPausedRef.current) { spawnTimeout = setTimeout(spawn, 100); return; }
              const textsDE_weak = ["123456", "hallo", "passwort", "qwertz", "bello", "12345678", "hund123", "geheim", "schatz", "liebe"];
              const textsDE_strong = ["Xy9!zL#", "M!ss1on", "K0mP!ex", "4mgehP!", "@Ssi@T", "IeÄ!_TT", "2HbliP._RB", "wE7?mQx", "1L@kP9$"];
              const currentSpeed = 0.8 + (timeRef.current * 0.02); 
              const generateItem = () => {
                const isWeak = Math.random() > 0.4; const texts = isWeak ? textsDE_weak : textsDE_strong;
                return { id: Math.random(), x: Math.random() * 70 + 15, y: -10, text: texts[Math.floor(Math.random() * texts.length)], isWeak, speed: currentSpeed };
              };
              setItems(prev => { let n = [...prev]; n[0] = [...n[0], generateItem()]; if (mode === 'vs') n[1] = [...n[1], generateItem()]; return n; });
              spawnTimeout = setTimeout(spawn, Math.max(600, 2500 - (timeRef.current * 40)));
            };
            spawnTimeout = setTimeout(spawn, 1000);
            return () => clearTimeout(spawnTimeout);
          }, [playing, mode]);

          useEffect(() => { if (lives[0] <= 0 || (mode === 'vs' && lives[1] <= 0)) setPlaying(false); }, [lives, mode]);

          const clickItem = (lane, id, isWeak) => {
            if (isWeak) setScore(s => { let ns = [...s]; ns[lane] += 10; return ns; });
            else { setLives(lv => { let nl = [...lv]; nl[lane] -= 1; return nl; }); triggerMistake(lane); }
            setItems(prev => { let n = [...prev]; n[lane] = n[lane].filter(i => i.id !== id); return n; });
          };

          const restartGame = () => { setScore([0, 0]); setLives([3, 3]); setItems([[], []]); setTime(0); timeRef.current = 0; isPausedRef.current = false; setFlash([false, false]); setCountdown(3); };
          const goSetup = () => { setScore([0, 0]); setLives([3, 3]); setItems([[], []]); setTime(0); timeRef.current = 0; isPausedRef.current = false; setFlash([false, false]); setSetup(true); };

          const isCamouflage = time >= 30;

          if (setup) {
            return (
              <ScreenWrapper title={t('l5_title')} onBack={onBack} agentNames={agentNames} t={t} lang={lang} onLangToggle={onLangToggle} onTeacherCode={onTeacherCode}>
                <div className="text-center space-y-10 max-w-4xl mx-auto py-6 w-full relative">
                  <Terminal size={80} className="text-cyan-400 mx-auto drop-shadow-lg" />
                  <h2 className="text-2xl font-bold font-mono text-white uppercase tracking-widest pb-6 border-b border-slate-700">{t('l5_head')}</h2>
                  <div className="bg-slate-900 p-8 rounded-2xl border border-cyan-500/50 text-left space-y-6 shadow-xl">
                    <p className="text-lg text-slate-100">{t('l5_p1')}</p>
                    <p className="text-lg font-bold font-mono text-rose-400 uppercase">{t('l5_p2')}</p>
                    <p className="text-lg font-bold font-mono text-emerald-400 uppercase">{t('l5_p3')}</p>
                    <div className="bg-slate-950 p-6 rounded-xl border border-slate-700 text-amber-400 text-lg shadow-md">{t('l5_warn')}</div>
                  </div>
                  <div className="grid grid-cols-1 gap-6 pt-6 relative z-10 max-w-2xl mx-auto w-full">
                    {!agentNames[1] ? <Button onClick={() => { setMode('single'); setSetup(false); setCountdown(3); }} variant="primary" icon={Terminal}>{t('l5_single')}</Button> : (
                      <>
                        <Button onClick={() => { setMode('coop'); setSetup(false); setCountdown(3); }} variant="success" icon={Users}>{t('l5_coop')}</Button>
                        <div className="bg-slate-900 p-6 rounded-2xl border border-slate-700 shadow-xl space-y-6">
                          <Button onClick={() => { setMode('vs'); setSetup(false); setCountdown(3); }} variant="danger" icon={Target}>{t('l5_vs')}</Button>
                          <div className="bg-slate-950 p-4 rounded-xl border border-slate-800 flex items-center justify-between gap-2 shadow-inner">
                            <div className="text-white font-bold font-mono text-lg text-center w-1/3 uppercase">{p1Name}</div>
                            <button onClick={() => setSwappedSides(!swappedSides)} className="p-3 bg-slate-800 rounded-xl text-cyan-400 transition-colors hover:bg-slate-700 focus:outline-none"><ArrowRight size={24} className="rotate-180 inline -ml-2" /><ArrowRight size={24} className="inline -ml-2" /></button>
                            <div className="text-white font-bold font-mono text-lg text-center w-1/3 uppercase">{p2Name}</div>
                          </div>
                        </div>
                      </>
                    )}
                  </div>
                </div>
              </ScreenWrapper>
            );
          }

          return (
            <div className="fixed inset-0 bg-slate-950 z-[200] flex overflow-hidden select-none touch-none">
              <div className="absolute inset-0 opacity-40 pointer-events-none" style={{ backgroundImage: 'linear-gradient(rgba(6, 182, 212, 0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(6, 182, 212, 0.1) 1px, transparent 1px)', backgroundSize: '30px 30px' }}></div>
              {countdown !== null && <div className="absolute inset-0 z-[300] bg-slate-950/80 flex items-center justify-center backdrop-blur-md"><span className="text-2xl font-bold font-mono text-cyan-400 uppercase tracking-[0.5em] animate-pulse" style={{ transform: 'scale(3)' }}>{countdown > 0 ? countdown : "GO!"}</span></div>}
              {[...Array(mode === 'vs' ? 2 : 1)].map((_, laneIdx) => (
                <div key={laneIdx} className={`relative flex-1 border-slate-800 transition-colors duration-150 ${laneIdx === 0 && mode === 'vs' ? 'border-r' : ''} ${flash[laneIdx] ? 'bg-rose-950/80' : ''}`}>
                  <div className="absolute top-6 left-6 right-6 z-[210] flex justify-between items-center gap-4 pointer-events-none">
                     <div className="flex flex-col gap-3">
                        {mode === 'vs' && <div className="bg-slate-900/90 px-4 py-2 rounded-xl border border-slate-700 inline-block shadow-md"><span className="text-cyan-400 font-bold font-mono text-lg uppercase">{laneIdx === 0 ? p1Name : p2Name}</span></div>}
                        <div className="bg-slate-900/90 p-4 rounded-xl border border-cyan-500/50 text-cyan-400 font-bold font-mono text-2xl inline-block shadow-md">{t('l5_score')} {score[laneIdx]}</div>
                     </div>
                     <div className="flex gap-2 bg-slate-900/90 p-4 rounded-xl border border-rose-500/30 shadow-md">{[...Array(3)].map((_, i) => <Heart key={i} size={24} className={`${i < lives[laneIdx] ? 'text-rose-500 fill-current' : 'text-slate-800'}`} />)}</div>
                  </div>
                  {time === 30 && <div className="absolute top-1/2 w-full bg-amber-500/90 border-y-2 border-amber-300 text-slate-900 font-bold font-mono py-6 text-center transform -translate-y-1/2 -rotate-12 pointer-events-none text-2xl uppercase z-[220] shadow-xl">{t('l5_camo')}</div>}
                  <div className="h-full w-full relative">
                    {items[laneIdx].map(i => (
                      <button key={i.id} onPointerDown={() => clickItem(laneIdx, i.id, i.isWeak)} style={{ left: `${i.x}%`, top: `${i.y}%` }} className={`absolute p-4 rounded-xl border-2 font-bold font-mono text-lg tracking-wider transform -translate-x-1/2 shadow-md active:scale-90 touch-manipulation whitespace-nowrap focus:outline-none ${isCamouflage ? 'bg-slate-800 text-slate-300 border-slate-600' : (i.isWeak ? 'bg-rose-950/80 text-rose-400 border-rose-500/50' : 'bg-emerald-950/80 text-emerald-400 border-emerald-500/50')}`}>{i.text}</button>
                    ))}
                  </div>
                  <div className="absolute bottom-0 w-full h-16 bg-cyan-950/80 border-t border-cyan-500/50 flex items-center justify-center font-bold font-mono text-2xl text-cyan-500 uppercase tracking-widest z-[230]">{t('l5_server')}</div>
                </div>
              ))}
              {!playing && countdown === null && (
                <div className="absolute inset-0 bg-slate-950/95 backdrop-blur-xl flex flex-col items-center justify-center z-[250] p-6 text-center">
                  <div className="max-w-2xl w-full">
                    <h2 className="text-2xl font-bold font-mono text-rose-500 mb-8 uppercase tracking-[0.3em] border-b border-rose-500/30 pb-4">{t('l5_gameover')}</h2>
                    <div className="bg-slate-900 p-8 rounded-2xl border border-slate-700 mb-8 w-full shadow-2xl">
                      {mode === 'vs' ? (
                        <div className="space-y-8">
                           <p className="text-cyan-400 font-bold font-mono text-2xl uppercase tracking-widest border-b border-slate-800 pb-4">{t('l5_endstand')}</p>
                           <div className="flex justify-between items-center text-2xl font-bold font-mono text-white bg-slate-950 p-4 rounded-xl border border-slate-800 shadow-inner"><span className="uppercase">{p1Name}</span> <span className="text-cyan-400">{score[0]}</span></div>
                           <div className="flex justify-between items-center text-2xl font-bold font-mono text-white bg-slate-950 p-4 rounded-xl border border-slate-800 shadow-inner"><span className="uppercase">{p2Name}</span> <span className="text-cyan-400">{score[1]}</span></div>
                           <div className="bg-emerald-950/50 p-6 rounded-xl border border-emerald-500/50 mt-8 shadow-md"><p className="text-emerald-400 text-2xl font-bold font-mono uppercase">{score[0] === score[1] ? t('l5_tie') : (score[0] > score[1] ? p1Name : p2Name) + ' ' + t('l5_wins')}</p></div>
                        </div>
                      ) : (
                        <div className="py-6 space-y-8"><p className="text-cyan-400 font-bold font-mono text-2xl uppercase tracking-widest">{t('l5_score')}</p><p className="text-2xl font-bold font-mono text-white" style={{ transform: 'scale(3)' }}>{score[0]}</p></div>
                      )}
                    </div>
                    <div className="flex flex-col gap-4 max-w-md mx-auto w-full">
                       <Button onClick={restartGame} variant="primary" icon={PlayCircle}>{t('l5_playAgain')}</Button>
                       {agentNames[1] && <Button onClick={goSetup} variant="secondary" icon={Target}>{t('l5_changeMode')}</Button>}
                       <Button onClick={onBack} variant="secondary" icon={Lock}>{t('finish')}</Button>
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        };

        // --- App Root ---
        const App = () => {
          const [view, setView] = useState('welcome');
          const [agentNames, setAgentNames] = useState(["", ""]);
          const [maxUnlocked, setMaxUnlocked] = useState(1);
          const [activeLevel, setActiveLevel] = useState(1);
          const [levelStates, setLevelStates] = useState({});
          const [lang, setLang] = useState('de');

          const t = (key) => translations[lang][key] || translations['de'][key] || key;
          const updateState = (id, s) => setLevelStates(prev => ({ ...prev, [id]: { ...prev[id], ...s } }));

          const handleTeacherCode = (code) => {
            if (code === "download") {
              const htmlContent = `<!DOCTYPE html>\n<html>\n<head>\n<meta charset="utf-8">\n<title>Mission Sicheres Passwort</title>\n</head>\n<body>\n${document.documentElement.innerHTML}\n</body>\n</html>`;
              const blob = new Blob([htmlContent], { type: 'text/html' });
              const url = URL.createObjectURL(blob);
              const a = document.createElement('a'); a.href = url; a.download = 'Mission_Sicheres_Passwort_Source.html';
              document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
              alert("Lernpfad-Code wurde als HTML heruntergeladen!");
            } else if (code === "KleallesFrei") { setMaxUnlocked(5); alert("ZUTRITT ERTEILT: Alle Akten sind frei!"); } 
            else if (code === "KleLoesung") {
              updateState(activeLevel, { step: 4, q1Done: true, hackerDone: true, answered: true, gameWon: true, solved: true, abDone: true, worksheetDone: true, checked: true, sortChecked: true, analysisDone: true, trickIdx: 3, activeTaskIdx: 1, showAB: true, subAkte: 2 });
              alert("AKTUELLER SCHRITT ERFOLGREICH ÜBERBRÜCKT.");
            } else alert("CODE UNGÜLTIG.");
          };

          const handleSelectLevel = (id) => { setActiveLevel(id); setView('level'); };

          const renderContent = () => {
            if (view === 'welcome') return <SetupScreen onStart={(m, n) => { setAgentNames(n); setView('overview'); }} t={t} lang={lang} onLangToggle={() => setLang(l => l === 'de' ? 'ru' : 'de')} onTeacherCode={handleTeacherCode} />;

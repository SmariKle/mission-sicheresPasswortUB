            if (view === 'overview') return <OverviewScreen maxUnlocked={maxUnlocked} onSelectLevel={handleSelectLevel} agentNames={agentNames} t={t} lang={lang} onLangToggle={() => setLang(l => l === 'de' ? 'ru' : 'de')} onTeacherCode={handleTeacherCode} />;
            
            const id = activeLevel;
            const props = { 
              lang, onLangToggle: () => setLang(l => l === 'de' ? 'ru' : 'de'), t, 
              state: levelStates[id] || {}, updateState: (s) => updateState(id, s), 
              onBack: () => setView('overview'), 
              onComplete: () => { 
                if (id === 3) {
                  setMaxUnlocked(4); // Schaltet nach Akte 3 direkt nur Akte 4 frei
                  setView('cert'); // Geht direkt zum Zertifikat
                } else {
                  setMaxUnlocked(Math.max(maxUnlocked, id + 1)); 
                  setView('overview'); 
                }
              }, 
              agentNames, onTeacherCode: handleTeacherCode
            };

            switch (id) {
              case 1: return <Level1 {...props} />;
              case 2: return <Level2 {...props} />;
              case 3: return <Level3 {...props} />;
              case 4: return <BonusMissions {...props} />;
              case 5: return <Minigame onBack={() => setView('overview')} agentNames={agentNames} t={t} lang={lang} onLangToggle={props.onLangToggle} onTeacherCode={handleTeacherCode} />;
              default: return null;
            }
          };

          if (view === 'cert') return (
            <ScreenWrapper title={t('cert_title')} agentNames={agentNames} t={t} lang={lang} onLangToggle={() => setLang(l => l === 'de' ? 'ru' : 'de')}>
              <div className="w-full px-4 mt-12 relative z-10">
                <div className="bg-slate-900 border border-cyan-500/50 rounded-2xl p-8 md:p-12 max-w-4xl mx-auto text-center relative shadow-xl">
                  <div className="absolute top-[-40px] left-1/2 transform -translate-x-1/2"><div className="bg-cyan-900 p-4 rounded-xl border border-cyan-500/50"><Award size={48} className="text-cyan-400" /></div></div>
                  <h2 className="text-2xl font-bold font-mono text-cyan-400 uppercase mt-12 mb-6 pb-4 border-b border-slate-800">{t('cert_title')}</h2>
                  <p className="text-slate-400 font-bold font-mono uppercase mb-8 text-lg">{t('cert_auth')}</p>
                  <p className="text-lg text-slate-200 mb-8">{t('cert_conf')}</p>
                  <div className="flex flex-wrap justify-center gap-4 mb-8">
                    {agentNames.map(n => n && <span key={n} className="text-2xl font-bold font-mono text-emerald-400 bg-emerald-950/50 px-6 py-3 rounded-xl border border-emerald-500/50 uppercase shadow-md">{n}</span>)}
                    {!agentNames[0] && <span className="text-2xl font-bold font-mono text-emerald-400 bg-emerald-950/50 px-6 py-3 rounded-xl border border-emerald-500/50 uppercase shadow-md">{t('cert_unknownAgent')}</span>}
                  </div>
                  <p className="text-lg text-slate-200 mb-12 max-w-2xl mx-auto leading-relaxed">{t('cert_text')}</p>
                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-8 border-t border-slate-800 pt-8 mt-8 max-w-2xl mx-auto">
                      <div><div className="font-bold font-mono text-cyan-400 text-2xl mb-2 uppercase">{t('cert_sysadmin')}</div><p className="text-lg text-slate-500 uppercase">{t('cert_examiner')}</p></div>
                      <div><div className="font-bold font-mono text-cyan-400 text-2xl mb-2 uppercase">{new Date().toLocaleDateString('de-DE')}</div><p className="text-lg text-slate-500 uppercase">{t('cert_date')}</p></div>
                  </div>
                </div>
                <div className="mt-12 text-center max-w-md mx-auto"><Button onClick={() => setView('overview')} variant="secondary" icon={Terminal}>{t('cert_back')}</Button></div>
              </div>
            </ScreenWrapper>
          );

          return <div className="bg-slate-950 min-h-screen">{renderContent()}</div>;
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mission Neuland</title>
    <!-- Lädt das Tailwind-Design -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lädt Babel, um den React-Code im Browser auszuführen -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Sagt dem Browser, wo er React und die Icons findet (strikt gepinnte Versionen verhindern Konflikte) -->
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18.3.1",
          "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
          "lucide-react": "https://esm.sh/lucide-react@0.447.0?external=react"
        }
      }
    </script>
    
    <style>
      body { margin: 0; background-color: #020617; }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Der eigentliche React-Code -->
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
          Rocket, Star, Telescope, Cpu, Search, 
          Crosshair, Zap, Dices, Globe, Laptop, Terminal, 
          AlertTriangle, CheckCircle, XCircle, FileText, Award, User, 
          ArrowLeft, Heart, Layers, Satellite, Hexagon, Database, Lock, ArrowDown
        } from 'lucide-react';

        // --- Helper Functions & Content ---
        const FUNNY_NAMES = ["Astro-Panda", "Nova-Keks", "Galaxis-Fuchs", "Sternen-Kröte", "Kosmos-Koala", "Raketen-Dachs", "Meteor-Maus", "Quasar-Qualle", "Kometen-Katze", "Orbital-Otter", "Warp-Waschbär", "Pluto-Pinguin"];
        const getRandomName = () => FUNNY_NAMES[Math.floor(Math.random() * FUNNY_NAMES.length)];

        // --- UI & Space Brutalism Theme Components ---
        const Background = () => (
          <div className="fixed inset-0 z-0 bg-slate-950 overflow-hidden pointer-events-none">
            <div className="absolute inset-0 opacity-40" style={{ backgroundImage: 'radial-gradient(#ffffff 1px, transparent 1px)', backgroundSize: '40px 40px', backgroundPosition: '0 0' }}></div>
            <div className="absolute inset-0 opacity-20" style={{ backgroundImage: 'radial-gradient(#ffffff 2px, transparent 2px)', backgroundSize: '100px 100px', backgroundPosition: '20px 20px' }}></div>
            <div className="absolute top-[-20%] left-[-10%] w-[60vw] h-[60vw] bg-violet-600 rounded-full blur-[100px] opacity-40"></div>
            <div className="absolute bottom-[-10%] right-[-10%] w-[50vw] h-[50vw] bg-fuchsia-600 rounded-full blur-[100px] opacity-30"></div>
            <div className="absolute top-[40%] left-[60%] w-[30vw] h-[30vw] bg-cyan-600 rounded-full blur-[80px] opacity-20"></div>
          </div>
        );

        const GameBox = ({ children, className = "" }) => (
          <div className={`bg-slate-900 border-4 border-slate-950 rounded-3xl shadow-[8px_8px_0px_#020617] relative ${className}`}>
            {children}
          </div>
        );

        const ScreenWrapper = ({ children, title, onBack, gameMode, agentNames }) => (
          <div className="min-h-screen text-slate-100 font-sans p-3 md:p-6 flex flex-col items-center pb-24 relative overflow-x-hidden selection:bg-cyan-400 selection:text-slate-900">
            <Background />
            <div className="w-full max-w-4xl relative z-10 flex flex-col gap-6 animate-fade-in-up">
              <GameBox className="p-4 md:p-5 flex items-center justify-between bg-slate-900">
                <div className="flex items-center gap-3">
                  {onBack && (
                    <button onClick={onBack} className="bg-cyan-500 hover:bg-cyan-400 p-2 md:p-3 rounded-xl border-4 border-slate-950 shadow-[0_4px_0_#020617] active:translate-y-[4px] active:shadow-none transition-all">
                      <ArrowLeft className="w-5 h-5 md:w-6 md:h-6 text-slate-950 font-bold" />
                    </button>
                  )}
                  <div className="bg-fuchsia-500 p-2 md:p-3 rounded-xl border-4 border-slate-950 shadow-[0_4px_0_#020617] transform -rotate-3">
                    <Rocket className="text-slate-950 w-6 h-6 md:w-8 md:h-8" />
                  </div>
                  <h1 className="text-xl md:text-3xl font-black text-white uppercase tracking-widest drop-shadow-md" style={{ WebkitTextStroke: '1px #020617' }}>{title}</h1>
                </div>
                
                {agentNames && (
                  <div className="flex gap-2">
                    {agentNames[0] && <div className="hidden md:flex items-center gap-2 bg-emerald-400 px-3 py-2 rounded-xl border-4 border-slate-950 shadow-[0_4px_0_#020617] text-sm md:text-base font-bold text-slate-950"><User className="w-5 h-5"/> {agentNames[0]}</div>}
                    {agentNames[1] && <div className="hidden md:flex items-center gap-2 bg-cyan-400 px-3 py-2 rounded-xl border-4 border-slate-950 shadow-[0_4px_0_#020617] text-sm md:text-base font-bold text-slate-950"><User className="w-5 h-5"/> {agentNames[1]}</div>}
                    <div className="md:hidden text-slate-950 font-black bg-fuchsia-500 px-4 py-2 rounded-xl border-4 border-slate-950 shadow-[0_4px_0_#020617]">A:{gameMode}</div>
                  </div>
                )}
              </GameBox>

              <GameBox className="p-4 md:p-8 min-h-[70vh] flex flex-col bg-slate-800">
                {children}
              </GameBox>
            </div>
          </div>
        );

        const SectionTitle = ({ children, icon: Icon, color = "bg-violet-500" }) => (
          <h2 className="text-2xl md:text-3xl font-black text-white mb-6 flex items-center gap-3 mt-8 drop-shadow-md">
            {Icon && <div className={`${color} p-2 md:p-3 rounded-xl border-4 border-slate-950 shadow-[0_4px_0_#020617] transform rotate-3`}><Icon className="w-6 h-6 text-slate-950" /></div>}
            <span style={{ WebkitTextStroke: '1px #020617' }}>{children}</span>
          </h2>
        );

        const InfoCard = ({ children, title = "Daten-Logbuch", colorClass = "bg-cyan-100 text-cyan-700", borderClass = "bg-cyan-200" }) => (
          <div className={`${colorClass.split(' ')[0]} p-5 md:p-6 rounded-3xl border-4 border-slate-950 mb-8 text-lg leading-relaxed shadow-[6px_6px_0px_#020617] text-slate-800 font-medium relative overflow-hidden`}>
            <div className={`absolute top-0 right-0 w-16 h-16 ${borderClass} rounded-bl-full opacity-50`}></div>
            <h3 className={`${colorClass.split(' ')[1]} font-black mb-3 uppercase tracking-widest flex items-center gap-2 text-xl`}>
              <Database className="w-6 h-6"/> {title}
            </h3>
            <div className="relative z-10">{children}</div>
          </div>
        );

        const WorksheetStop = ({ children }) => (
          <div className="bg-amber-400 border-4 border-slate-950 p-5 md:p-6 rounded-3xl mt-10 mb-8 flex flex-col md:flex-row items-center gap-5 shadow-[6px_6px_0px_#020617] transform -rotate-1 hover:rotate-0 transition-transform">
            <div className="bg-white p-3 rounded-2xl border-4 border-slate-950 shadow-[0_4px_0_#020617]">
              <FileText className="text-amber-500 w-10 h-10 animate-bounce" />
            </div>
            <div>
              <h3 className="text-slate-950 font-black text-2xl uppercase tracking-wider mb-2">Achtung: Logbuch-Eintrag!</h3>
              <p className="text-slate-900 font-bold text-lg leading-snug">{children}</p>
            </div>
          </div>
        );

        const Button = ({ onClick, children, variant = 'primary', disabled = false, className = "" }) => {
          const base = "w-full py-4 px-6 rounded-2xl font-black text-xl md:text-2xl transition-all flex items-center justify-center gap-3 select-none uppercase tracking-wider";
          const variants = {
            primary: "bg-fuchsia-500 hover:bg-fuchsia-400 text-white border-4 border-slate-950 shadow-[0_6px_0_#020617] active:translate-y-[6px] active:shadow-none disabled:bg-slate-600 disabled:shadow-[0_6px_0_#020617] disabled:active:translate-y-0",
            secondary: "bg-cyan-400 hover:bg-cyan-300 text-slate-950 border-4 border-slate-950 shadow-[0_6px_0_#020617] active:translate-y-[6px] active:shadow-none",
            success: "bg-emerald-400 hover:bg-emerald-300 text-slate-950 border-4 border-slate-950 shadow-[0_6px_0_#020617] active:translate-y-[6px] active:shadow-none",
            danger: "bg-rose-500 hover:bg-rose-400 text-white border-4 border-slate-950 shadow-[0_6px_0_#020617] active:translate-y-[6px] active:shadow-none"
          };
          return (
            <button onClick={onClick} disabled={disabled} className={`${base} ${variants[variant]} ${className}`}>
              {children}
            </button>
          );
        };

        const ArrowRight = () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M14 5l7 7m0 0l-7 7m7-7H3" /></svg>;

        // --- Levels & Screens ---

        const SetupScreen = ({ onStart }) => {
          const [step, setStep] = useState(1);
          const [mode, setMode] = useState(1);
          const [names, setNames] = useState(["", ""]);

          const handleModeSelect = (m) => {
            setMode(m);
            setStep(2);
          };

          const handleStart = () => {
            const finalNames = [
              names[0].trim() || getRandomName(),
              mode === 2 ? (names[1].trim() || getRandomName()) : ""
            ];
            onStart(mode, finalNames);
          };

          if (step === 1) {
            return (
              <ScreenWrapper title="Akademie Login">
                <div className="text-center space-y-10 py-8">
                  <div className="relative inline-block animate-bounce">
                    <div className="bg-fuchsia-500 p-6 rounded-full border-4 border-slate-950 shadow-[8px_8px_0px_#020617]">
                      <Globe className="w-24 h-24 text-white" />
                    </div>
                  </div>
                  <h2 className="text-4xl md:text-6xl font-black text-white uppercase tracking-widest drop-shadow-md" style={{ WebkitTextStroke: '2px #020617' }}>Mission<br/><span className="text-cyan-400">Neuland</span></h2>
                  
                  <div className="bg-violet-600 p-6 md:p-8 rounded-3xl text-left border-4 border-slate-950 shadow-[6px_6px_0px_#020617] transform rotate-1">
                    <h3 className="text-white font-black uppercase text-2xl mb-4 flex items-center gap-3" style={{ WebkitTextStroke: '1px #020617' }}>
                      <div className="p-2 bg-cyan-400 rounded-xl border-2 border-slate-950"><Crosshair className="w-6 h-6 text-slate-950" /></div> Willkommen Rekruten!
                    </h3>
                    <p className="text-xl text-white font-bold leading-relaxed">
                      Macht euch auf in die Welt der Informatik! Bevor wir tiefer in die Materie eintauchen, müsst ihr euer Handwerkszeug verstehen. Findet heraus, was sich hinter diesem riesigen Universum an Wissen verbirgt.
                    </p>
                  </div>

                  <div className="pt-8">
                    <h3 className="text-slate-300 mb-6 uppercase tracking-widest font-black text-xl">Wie viele Astronauten fliegen mit?</h3>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                      <Button onClick={() => handleModeSelect(1)} variant="secondary" className="h-32 text-2xl">
                        <User className="w-10 h-10" /> Solo-Flug (1)
                      </Button>
                      <Button onClick={() => handleModeSelect(2)} variant="success" className="h-32 text-2xl">
                        <div className="flex -space-x-3"><User className="w-10 h-10" /><User className="w-10 h-10 text-emerald-900" /></div> Crew-Modus (2)
                      </Button>
                    </div>
                  </div>
                </div>
              </ScreenWrapper>
            );
          }

          return (
            <ScreenWrapper title="Fluglizenz-ID" onBack={() => setStep(1)}>
              <div className="max-w-xl mx-auto w-full py-8 space-y-8">
                <h2 className="text-3xl md:text-4xl font-black text-center text-white drop-shadow-md" style={{ WebkitTextStroke: '1px #020617' }}>Wählt eure Funk-Namen!</h2>
                <p className="text-cyan-400 font-bold text-center text-xl bg-slate-900 p-4 rounded-xl border-4 border-slate-950">Nutzt lustige Space-Namen, niemals eure echten!</p>
                
                <div className="space-y-8 mt-10">
                  <div className="bg-emerald-400 p-6 rounded-3xl border-4 border-slate-950 shadow-[6px_6px_0px_#020617] transform -rotate-1">
                    <label className="text-slate-950 font-black uppercase text-xl mb-3 block">Astronaut 1</label>
                    <div className="flex gap-3">
                      <input 
                        type="text" 
                        value={names[0]} 
                        onChange={e => setNames([e.target.value, names[1]])}
                        placeholder="Name eingeben..."
                        className="flex-1 bg-white border-4 border-slate-950 rounded-2xl px-5 py-4 text-2xl text-slate-800 font-bold focus:outline-none focus:ring-4 focus:ring-fuchsia-500"
                      />
                      <button onClick={() => setNames([getRandomName(), names[1]])} className="bg-fuchsia-500 border-4 border-slate-950 hover:bg-fuchsia-400 rounded-2xl px-6 text-white active:translate-y-[4px] shadow-[0_4px_0_#020617] active:shadow-none transition-all">
                        <Dices className="w-8 h-8" />
                      </button>
                    </div>
                  </div>

                  {mode === 2 && (
                    <div className="bg-cyan-400 p-6 rounded-3xl border-4 border-slate-950 shadow-[6px_6px_0px_#020617] transform rotate-1 animate-fade-in-up">
                      <label className="text-slate-950 font-black uppercase text-xl mb-3 block">Astronaut 2</label>
                      <div className="flex gap-3">
                        <input 
                          type="text" 
                          value={names[1]} 
                          onChange={e => setNames([names[0], e.target.value])}
                          placeholder="Name eingeben..."
                          className="flex-1 bg-white border-4 border-slate-950 rounded-2xl px-5 py-4 text-2xl text-slate-800 font-bold focus:outline-none focus:ring-4 focus:ring-fuchsia-500"
                        />
                        <button onClick={() => setNames([names[0], getRandomName()])} className="bg-fuchsia-500 border-4 border-slate-950 hover:bg-fuchsia-400 rounded-2xl px-6 text-white active:translate-y-[4px] shadow-[0_4px_0_#020617] active:shadow-none transition-all">
                          <Dices className="w-8 h-8" />
                        </button>
                      </div>
                    </div>
                  )}
                </div>

                <div className="pt-10">
                  <Button onClick={handleStart} variant="primary">Auf ins All! <Rocket className="w-8 h-8" /></Button>
                </div>
              </div>
            </ScreenWrapper>
          );
        };

        const OverviewScreen = ({ maxUnlocked, onSelectLevel, gameMode, agentNames }) => {
          const levels = [
            { id: 1, title: "Das Missions-Tutorial", color: "bg-rose-500" },
            { id: 2, title: "Was ist Informatik?", color: "bg-orange-500" },
            { id: 3, title: "Die 3 Kern-Fachgebiete", color: "bg-emerald-500" },
            { id: 4, title: "Körper & Geist des Systems", color: "bg-teal-500" },
            { id: 5, title: "Die Fluglizenz", color: "bg-cyan-500" },
            { id: 6, title: "Endboss: Zuordnungs-Matrix", color: "bg-fuchsia-600" } 
          ];

          return (
            <ScreenWrapper title="Sternenkarte" gameMode={gameMode} agentNames={agentNames}>
              <div className="bg-slate-900 p-4 rounded-2xl border-4 border-slate-950 mb-8 inline-block mx-auto transform -rotate-1">
                <p className="text-white font-bold text-lg md:text-xl text-center">Wählt die nächste Mission aus. Abgeschlossene Missionen können wiederholt werden.</p>
              </div>
              
              <div className="grid grid-cols-1 md:grid-cols-2 gap-5 md:gap-6">
                {levels.map(level => {
                  const isUnlocked = level.id <= maxUnlocked;
                  const isCompleted = level.id < maxUnlocked && level.id !== 6;
                  
                  return (
                    <button
                      key={level.id}
                      onClick={() => isUnlocked && onSelectLevel(level.id)}
                      disabled={!isUnlocked}
                      className={`w-full p-5 rounded-3xl border-4 flex items-center justify-between transition-all group text-left ${
                        isUnlocked 
                          ? `${level.id === 6 ? 'bg-indigo-700 border-slate-950 text-white shadow-[0_6px_0_#020617]' : 'bg-slate-50 border-slate-950 text-slate-800 hover:-translate-y-1 shadow-[0_6px_0_#020617]'} cursor-pointer` 
                          : 'bg-slate-800 border-slate-950 text-slate-500 opacity-80 shadow-none cursor-not-allowed'
                      } ${level.id === 6 ? 'md:col-span-2' : ''}`}
                    >
                      <div className="flex items-center gap-4">
                        <div className={`w-14 h-14 rounded-2xl border-4 border-slate-950 flex items-center justify-center font-black text-2xl shadow-[0_4px_0_rgba(0,0,0,0.5)] ${
                          isCompleted ? 'bg-amber-400 text-slate-900' : isUnlocked ? `${level.color} text-white` : 'bg-slate-700 text-slate-500 shadow-none border-slate-800'
                        }`}>
                          {isCompleted ? <Star className="w-8 h-8 fill-current" /> : level.id}
                        </div>
                        <span className={`text-xl md:text-2xl font-black uppercase tracking-wide ${!isUnlocked && 'text-slate-500'}`}>
                          {level.title}
                        </span>
                      </div>
                      {!isUnlocked && <div className="bg-slate-900 p-3 rounded-full border-4 border-slate-950"><Lock className="text-slate-500 w-6 h-6" /></div>}
                      {isUnlocked && level.id === 6 && <div className="bg-fuchsia-500 p-3 rounded-full border-4 border-slate-950 animate-bounce"><Zap className="text-white w-6 h-6" /></div>}
                    </button>
                  );
                })}
              </div>
            </ScreenWrapper>
          );
        };

        // --- Level 1: Das Tutorial ---
        const Level1 = ({ state, updateState, onBack, onComplete, showSolution, t, agentNames }) => {
          const { answered = false, errorMsg = "" } = state;
          useEffect(() => { if (showSolution) updateState({ answered: true, errorMsg: "" }); }, [showSolution]);

          return (
            <ScreenWrapper title="Mission 1: Das Tutorial" onBack={onBack} agentNames={agentNames}>
              <InfoCard title="1. Scannen & Verstehen">
                Ein digitaler Lernpfad ist wie eine <strong>Simulation für dein Gehirn</strong>. <br/><br/>
                In diesen blauen Info-Kästen (den <em>Daten-Logbüchern</em>) versteckt sich immer das wichtigste Missions-Wissen. Ihr müsst sie aufmerksam durchlesen, denn unten drunter wartet oft ein Check-up, um zu prüfen, ob ihr aufgepasst habt!
              </InfoCard>
              
              <WorksheetStop>
                <strong>2. Analoges Logbuch:</strong> Wenn dieser gelbe Kasten auftaucht, heißt das: Bordcomputer kurz zur Seite legen! Nehmt jetzt euer Arbeitsblatt aus echtem Papier, schreibt euren Namen darauf und kreuzt an, dass ihr das Tutorial gefunden habt.
              </WorksheetStop>

              <SectionTitle icon={AlertTriangle} color="bg-rose-500">3. Check-up meistern</SectionTitle>
              <div className="space-y-4 mb-8">
                <p className="text-white font-bold text-xl mb-4">Was sollt ihr tun, wenn ein <strong>gelber Logbuch-Eintrag (Arbeitsblatt-Stopp)</strong> erscheint?</p>
                <button onClick={() => updateState({errorMsg: "Falsch! Wer die Instruktionen ignoriert, fliegt an die Sonne. Lest nochmal genau."})} className="w-full text-left p-6 bg-white hover:bg-slate-100 rounded-3xl border-4 border-slate-950 shadow-[0_4px_0_#020617] text-slate-800 font-bold text-xl active:translate-y-[4px] active:shadow-none transition-all">
                  [A] Schnell weiterklicken, der Autopilot macht das schon.
                </button>
                <button onClick={() => updateState({errorMsg: "Negativ! Nichts muss auf den Bildschirm gemalt werden."})} className="w-full text-left p-6 bg-white hover:bg-slate-100 rounded-3xl border-4 border-slate-950 shadow-[0_4px_0_#020617] text-slate-800 font-bold text-xl active:translate-y-[4px] active:shadow-none transition-all">
                  [B] Das Arbeitsblatt an den Bildschirm halten und den Text abpausen.
                </button>
                <button onClick={() => updateState({answered: true, errorMsg: ""})} className={`w-full text-left p-6 rounded-3xl border-4 font-bold text-xl transition-all shadow-[0_4px_0_#020617] active:translate-y-[4px] active:shadow-none ${answered ? 'bg-emerald-400 border-slate-950 text-slate-950' : 'bg-white hover:bg-slate-100 border-slate-950 text-slate-800'}`}>
                  [C] Das Tablet kurz weglegen und die Aufgabe auf dem echten Papier-Logbuch bearbeiten.
                </button>
              </div>

              {errorMsg && (
                <div className="p-5 mb-8 bg-rose-500 border-4 border-slate-950 shadow-[4px_4px_0px_#020617] rounded-2xl text-white flex items-center gap-4 font-bold text-xl animate-bounce">
                  <XCircle className="w-8 h-8 flex-shrink-0" /> <span>{errorMsg}</span>
                </div>
              )}

              {answered && (
                <div className="space-y-8 animate-fade-in-up">
                  <div className="p-6 bg-emerald-400 border-4 border-slate-950 rounded-3xl text-slate-950 flex items-center gap-4 shadow-[6px_6px_0px_#020617] transform rotate-1">
                    <CheckCircle className="w-10 h-10 flex-shrink-0" /> <strong className="text-2xl uppercase tracking-wider font-black">SUPER!</strong> Ihr habt die Systeme verstanden. Weiter geht's!
                  </div>
                  <Button onClick={onComplete} variant="success">Tutorial abgeschlossen <ArrowRight/></Button>
                </div>
              )}
            </ScreenWrapper>
          );
        };

        // --- Level 2: Was ist Informatik? (Wort-Herkunft & Dijkstra) ---
        const Level2 = ({ state, updateState, onBack, onComplete, showSolution, t, agentNames }) => {
          const { 
            infoClicked = false, 
            autoClicked = false
          } = state;
          
          useEffect(() => { 
            if (showSolution) updateState({ infoClicked: true, autoClicked: true }); 
          }, [showSolution]);

          const fused = infoClicked && autoClicked;

          return (
            <ScreenWrapper title="Mission 2: Was ist Informatik?" onBack={onBack} agentNames={agentNames}>
              
              {/* Teil 1: Wortbedeutung */}
              <SectionTitle icon={Hexagon} color="bg-fuchsia-500">Der Wort-Fusions-Reaktor</SectionTitle>
              <p className="text-white font-bold text-lg mb-4">Das Wort "Informatik" ist eigentlich eine Geheimformel. Klicke auf die beiden Grundbausteine, um sie zu vereinen!</p>
              
              <div className="flex flex-col md:flex-row gap-4 mb-6">
                <button 
                  onClick={() => updateState({ infoClicked: true })} 
                  className={`flex-1 p-6 rounded-3xl border-4 border-slate-950 shadow-[0_4px_0_#020617] font-black text-2xl md:text-3xl uppercase transition-all ${infoClicked ? 'bg-emerald-400 text-slate-950 translate-y-[4px] shadow-none' : 'bg-white text-slate-800 hover:bg-slate-100 active:translate-y-[4px] active:shadow-none'}`}
                >
                  Information
                </button>
                <div className="flex items-center justify-center">
                  <span className="text-4xl text-fuchsia-400 font-black">+</span>
                </div>
                <button 
                  onClick={() => updateState({ autoClicked: true })} 
                  className={`flex-1 p-6 rounded-3xl border-4 border-slate-950 shadow-[0_4px_0_#020617] font-black text-2xl md:text-3xl uppercase transition-all ${autoClicked ? 'bg-cyan-400 text-slate-950 translate-y-[4px] shadow-none' : 'bg-white text-slate-800 hover:bg-slate-100 active:translate-y-[4px] active:shadow-none'}`}
                >
                  Automatik
                </button>
              </div>

              {fused && (
                <div className="animate-fade-in-up mb-12">
                  <div className="flex justify-center mb-2 animate-bounce"><ArrowDown className="text-amber-400 w-12 h-12" /></div>

        // --- Level 3: Die 3 Kern-Fachgebiete ---
        const Level3 = ({ state, updateState, onBack, onComplete, showSolution, t, agentNames }) => {
          const { revealed = [], answered = false } = state;
          
          useEffect(() => { if (showSolution) updateState({ revealed: [0,1,2], answered: true }); }, [showSolution]);

          const toggleReveal = (idx) => {

          const allRevealed = revealed.length === 3;

          const disciplines = [
            { 
              title: "Theoretische Informatik", 
              icon: Hexagon, 
              color: "bg-sky-500", 
              dark: "bg-sky-800",
              light: "bg-sky-400",
              desc: "Hier geht es um grundlegende Fragestellungen zur Struktur, Verarbeitung, Übertragung, Speicherung und Wiedergabe von Informationen." 
            },
            { 
              title: "Technische Informatik", 
              icon: Cpu, 
              color: "bg-rose-500", 
              dark: "bg-rose-800",
              light: "bg-rose-400",
              desc: "Dieser Bereich beschäftigt sich mit dem Entwerfen, Realisieren und Bewerten von technischen Lösungen. Es geht also darum, wie die Technik hinter der Informatik funktioniert." 
            },
            { 
              title: "Praktische Informatik", 
              icon: Terminal, 
              color: "bg-amber-500", 
              dark: "bg-amber-800",
              light: "bg-amber-400",
              desc: 'Dieser Schwerpunkt liegt auf der "Nutzung" von Informatik. Das beinhaltet die Entwicklung von Programmiersprachen, Methoden für Programmierer und Betriebssystemen wie Windows und Linux. Alle anderen Programme, die Befehle ausführen, gehören ebenfalls hierzu.' 
            }
          ];

          return (
            <ScreenWrapper title="Mission 3: Die Fachgebiete" onBack={onBack} agentNames={agentNames}>
              <InfoCard title="Die Karte der Informatik">
                Es gibt <strong>insgesamt sechs Fachgebiete</strong> in der Informatik. Wir schauen uns jetzt die <strong>drei Kern-Fachgebiete</strong> genauer an.
              </InfoCard>

              <SectionTitle icon={Layers} color="bg-cyan-400">Scanne die 3 Kern-Gebiete</SectionTitle>
              <p className="text-white font-bold text-xl mb-6">Tippt auf die verschlüsselten Sektoren, um die Kern-Disziplinen zu entschlüsseln.</p>
              
              <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
                {disciplines.map((d, idx) => {
                  const isRev = revealed.includes(idx);
                  const IconComp = d.icon;
                  return (
                    <button 
                      key={idx} 
                      onClick={() => toggleReveal(idx)} 
                      className={`p-6 rounded-3xl border-4 border-slate-950 shadow-[6px_6px_0px_#020617] text-left transition-all ${isRev ? 'bg-slate-50 transform cursor-default' : `${d.color} hover:opacity-90 active:translate-y-1`}`}
                      style={isRev ? { transform: `rotate(${idx % 2 === 0 ? '1deg' : '-1deg'})` } : {}}
                    >
                      <div className={`${isRev ? d.light : d.dark} w-16 h-16 rounded-2xl border-4 border-slate-950 flex items-center justify-center mb-4 transition-colors`}>

                      </div>
                      <h3 className={`text-xl md:text-2xl font-black uppercase tracking-wider mb-4 ${isRev ? 'text-slate-950' : 'text-white'}`}>

                        <p className="text-base font-bold text-slate-700 leading-snug">{d.desc}</p>

                        <p className="text-white/80 font-bold uppercase tracking-widest mt-4">Verschlüsselt...</p>
                      )}

                <div className="animate-fade-in-up mt-8 text-center border-t-4 border-slate-700 pt-8">

                  <Button onClick={onComplete} variant="success">Mission abgeschlossen <ArrowRight/></Button>
                </div>
              )}
            </ScreenWrapper>
          );
        };

        // --- Level 4: Hardware vs Software ---
        const Level4 = ({ state, updateState, onBack, onComplete, showSolution, t, agentNames }) => {
          const initialItems = [
            { id: 1, name: "Tastatur", type: "hw", sorted: null },
            { id: 2, name: "Windows (Betriebssystem)", type: "sw", sorted: null },

            { id: 5, name: "Bildschirm", type: "hw", sorted: null },
            { id: 6, name: "Browser-App", type: "sw", sorted: null }
          ];

          const { items = initialItems, msg = "", isError = false, done = false } = state;

          useEffect(() => {
            if (showSolution) {
              updateState({ items: items.map(i => ({...i, sorted: i.type})), done: true, msg: "" });
            }
          }, [showSolution]);

          const handleSort = (item, guessType) => {
            if (item.type === guessType) {
              const newItems = items.map(i => i.id === item.id ? { ...i, sorted: guessType } : i);
              const isDone = newItems.every(i => i.sorted !== null);
              updateState({ items: newItems, isError: false, msg: isDone ? "ALLE TEILE SORTIERT!" : "", done: isDone });
            } else {
              updateState({ msg: "FALSCH! Überleg nochmal: Kannst du dieses Teil anfassen?", isError: true });
            }
          };

          const unsortedItem = items.find(i => i.sorted === null);

          return (
            <ScreenWrapper title="Mission 4: Körper & Geist" onBack={onBack} agentNames={agentNames}>
              <InfoCard title="Bauteile der Maschine">
                Jedes digitale Gerät (jede Rechenanlage) besteht aus zwei Teilen:<br/><br/>
                <strong>1. Hardware (Körper):</strong> Alles, was du an dem PC <strong>anfassen kannst</strong>. (Beispiele: Bildschirm, Tastatur).<br/><br/>
                <strong>2. Software (Geist):</strong> Die unsichtbaren <strong>Programme</strong>, die der Maschine sagen, was sie tun soll. (Beispiele: Windows, Android).

                    </div>
                  )}

                  <div className="grid grid-cols-2 gap-4 md:gap-8">
                    <button onClick={() => unsortedItem && handleSort(unsortedItem, 'hw')} className="bg-cyan-400 hover:bg-cyan-300 border-4 border-slate-950 p-6 md:p-8 rounded-3xl shadow-[0_6px_0_#020617] active:translate-y-[6px] active:shadow-none transition-all flex flex-col items-center gap-4">

                      <span className="text-xl md:text-3xl font-black text-slate-950 uppercase">Hardware</span>
                    </button>
                    <button onClick={() => unsortedItem && handleSort(unsortedItem, 'sw')} className="bg-emerald-400 hover:bg-emerald-300 border-4 border-slate-950 p-6 md:p-8 rounded-3xl shadow-[0_6px_0_#020617] active:translate-y-[6px] active:shadow-none transition-all flex flex-col items-center gap-4">
                      <Terminal className="w-12 h-12 text-slate-950" />
                      <span className="text-xl md:text-3xl font-black text-slate-950 uppercase">Software</span>
                    </button>
                  </div>

                  {msg && (
                    <div className={`mt-8 p-5 rounded-2xl text-xl font-black flex items-center justify-center gap-3 border-4 border-slate-950 shadow-[4px_4px_0px_#020617] animate-bounce ${isError ? 'bg-rose-500 text-white' : 'bg-emerald-400 text-slate-950'}`}>
                      {isError ? <XCircle className="w-8 h-8"/> : <CheckCircle className="w-8 h-8"/>} {msg}
                    </div>
                  )}
                </div>
              ) : (
                <div className="space-y-8 animate-fade-in-up">
                  <div className="p-6 bg-emerald-400 border-4 border-slate-950 rounded-3xl text-slate-950 flex items-center gap-4 shadow-[6px_6px_0px_#020617] transform rotate-1">
                    <CheckCircle className="w-12 h-12 flex-shrink-0" /> <span className="text-xl md:text-2xl font-black uppercase tracking-wider">System-Check erfolgreich!</span>
                  </div>
                  <WorksheetStop>
                    Erkläre in einem Satz, was Hard- und Software sind und ergänze jeweils ein Beispiel.
                  </WorksheetStop>
                  <Button onClick={onComplete} variant="success">Mission abgeschlossen <ArrowRight/></Button>
                </div>
              )}
            </ScreenWrapper>
          );
        };

        const Level5 = ({ onBack, onComplete, t, agentNames }) => (
          <ScreenWrapper title="Mission 5: Die Fluglizenz" onBack={onBack} agentNames={agentNames}>
            <div className="text-center space-y-10 mt-6 max-w-2xl mx-auto">
              <div className="relative inline-block">
                <div className="bg-amber-400 p-6 rounded-full border-4 border-slate-950 shadow-[8px_8px_0px_#020617] animate-bounce">
                  <Award className="w-24 h-24 text-slate-950" />
                </div>
              </div>
              <h2 className="text-4xl md:text-5xl font-black text-white uppercase tracking-widest drop-shadow-md" style={{ WebkitTextStroke: '1px #020617' }}>Bereit fürs All!</h2>
              <p className="text-2xl text-slate-200 font-bold bg-slate-900 p-4 rounded-2xl border-4 border-slate-950 inline-block">Du weißt nun, was Informatik ist.</p>
              
              <div className="bg-fuchsia-600 border-4 border-slate-950 p-8 text-left rounded-3xl shadow-[8px_8px_0px_#020617] transform -rotate-1">
                <h3 className="text-white font-black uppercase text-3xl mb-8 flex items-center gap-4 border-b-4 border-fuchsia-400 pb-4" style={{ WebkitTextStroke: '1px #020617' }}>
                  <Rocket className="w-10 h-10 text-cyan-300" /> Analog-Auftrag!
                </h3>
                <ol className="list-decimal pl-8 space-y-6 text-xl md:text-2xl text-white font-black">
                  <li>{t("Zeige", "Zeigt")} dem Commander (Lehrkraft) euer fertig ausgefülltes Logbuch.</li>
                  <li className="bg-fuchsia-800 p-4 rounded-xl border-4 border-slate-950 transform rotate-2 text-cyan-100">Macht euch bereit für die finale Endboss-Zuordnung!</li>
                </ol>
              </div>

              <div className="pt-8">
                <Button onClick={onComplete} variant="primary">
                  <CheckCircle className="w-8 h-8" /> Bestätigt: Lizenz erhalten!
                </Button>
              </div>
            </div>
          </ScreenWrapper>
        );

        // --- Minigame: Zuordnungs-Matrix ---
        const Minigame = ({ onBack, gameMode, agentNames }) => {
          const [setupMode, setSetupMode] = useState(true);
          const [currentStage, setCurrentStage] = useState(1);
          const [queue, setQueue] = useState([]);
          const [score, setScore] = useState(0);
          const [mistakes, setMistakes] = useState(0);
          const [feedback, setFeedback] = useState(null);
          const [timeLeft, setTimeLeft] = useState(5);

          const stage1Items = [
            { id: 1, text: "Drucker", type: "hw" },
            { id: 2, text: "Virenscanner", type: "sw" },
            { id: 3, text: "Prozessor (CPU)", type: "hw" },
            { id: 4, text: "Webbrowser", type: "sw" },
            { id: 5, text: "Festplatte", type: "hw" },
            { id: 6, text: "Smartphone-App", type: "sw" }
          ];

          const stage2Items = [
            { id: 7, text: "Algorithmen & Logik", type: "theo" },
            { id: 8, text: "Bau von Mikrochips", type: "tech" },
            { id: 9, text: "Entwicklung von Windows", type: "prak" },
            { id: 10, text: "Mathematik der IT", type: "theo" },
            { id: 11, text: "Kabel & Sensoren", type: "tech" },
            { id: 12, text: "Apps programmieren", type: "prak" }
          ];

          useEffect(() => {
            if (setupMode || queue.length === 0 || feedback) return;
            
            const timer = setInterval(() => {
              setTimeLeft(prev => {
                if (prev <= 1) {
                  handleTimeout();
                  return 0;
                }
                return prev - 1;
              });
            }, 1000);
            
            return () => clearInterval(timer);
          }, [queue.length, feedback, setupMode]);

          const handleTimeout = () => {
            setScore(s => Math.max(0, s - 5));
            setMistakes(m => m + 1);
            setFeedback({ type: 'error', text: 'Zu langsam! -5 Punkte' });
            setTimeout(() => {
              setFeedback(null);
              setQueue(q => [...q.slice(1), q[0]]);
              setTimeLeft(currentStage === 1 ? 5 : 10);
            }, 1500);
          };

          const startGame = () => {
            setSetupMode(false);
            setCurrentStage(1);
            setScore(0);
            setMistakes(0);
            setTimeLeft(5);
            setQueue([...stage1Items].sort(() => Math.random() - 0.5));
          };

          const startStage2 = () => {
            setCurrentStage(2);
            setTimeLeft(10);
            setQueue([...stage2Items].sort(() => Math.random() - 0.5));
          };

          const handleSort = (type) => {
            if (feedback) return;
            const currentItem = queue[0];
            if (!currentItem) return;

            if (currentItem.type === type) {
              setScore(s => s + 10);
              setFeedback({ type: 'success', text: 'Korrekt! +10' });
              setTimeout(() => {
                setFeedback(null);
                setQueue(q => q.slice(1));
                setTimeLeft(currentStage === 1 ? 5 : 10);
              }, 1000);
            } else {
              setScore(s => Math.max(0, s - 5));
              setMistakes(m => m + 1);
              setFeedback({ type: 'error', text: 'Falsch! -5 Punkte' });
              setTimeout(() => {
                setFeedback(null);
                setQueue(q => [...q.slice(1), currentItem]);
                setTimeLeft(currentStage === 1 ? 5 : 10);
              }, 1500);
            }
          };

          if (setupMode) {
            return (
              <ScreenWrapper title="Endboss: Zuordnungs-Matrix" onBack={onBack} agentNames={agentNames}>
                <div className="text-center space-y-8 py-8">

                    <div className="bg-fuchsia-500 p-6 rounded-full border-4 border-slate-950 shadow-[8px_8px_0px_#020617]">
                      <Layers className="w-24 h-24 text-white" />
                    </div>
                  </div>
                  <h2 className="text-4xl md:text-5xl font-black text-white uppercase drop-shadow-md" style={{ WebkitTextStroke: '2px #020617' }}>System-Matrix</h2>

                    <p className="text-xl text-slate-800 font-bold mb-4">
                      Beweist, dass ihr echte Informatik-Profis seid!

                    <ul className="list-disc pl-5 space-y-3 text-lg font-bold text-slate-700">
                      <li><strong>Level 1:</strong> Ordnet die Begriffe blitzschnell <em>Hardware</em> oder <em>Software</em> zu.</li>
                      <li><strong>Level 2:</strong> Sortiert die Themen in die richtige <em>Fachrichtung</em> der Informatik (Theoretisch, Technisch, Praktisch).</li>
                      <li>Für jede richtige Antwort gibt es Punkte. Ihr habt <strong>nur begrenzt Zeit (5s in Level 1, 10s in Level 2)</strong>! Macht ihr einen Fehler oder seid zu langsam, gibt es Punktabzug!</li>
                    </ul>
                  </div>
                  
                  <div className="pt-8">
                    <Button onClick={startGame} variant="primary" className="text-2xl py-6">Mission Starten <Rocket className="w-8 h-8" /></Button>
                  </div>
                </div>
              </ScreenWrapper>
            );
          }

          if (queue.length === 0) {
            if (currentStage === 1) {
              return (
                <ScreenWrapper title="Level 1 Geschafft!" onBack={onBack} agentNames={agentNames}>
                  <div className="text-center bg-slate-800 p-8 rounded-3xl border-4 border-slate-950 shadow-[8px_8px_0px_#020617] mt-10 max-w-lg mx-auto transform -rotate-1 animate-fade-in-up">
                    <h2 className="text-4xl font-black text-emerald-400 mb-6 uppercase">Hardware & Software gemeistert!</h2>
                    <p className="text-xl text-white font-bold mb-8">Aktuelle Punkte: {score}</p>
                    <Button onClick={startStage2} variant="success">Starte Level 2 <ArrowRight /></Button>
                  </div>
                </ScreenWrapper>
              );
            } else {
              return (
                <ScreenWrapper title="Mission Komplett" onBack={onBack} agentNames={agentNames}>
                  <div className="text-center bg-slate-800 p-8 rounded-3xl border-4 border-slate-950 shadow-[8px_8px_0px_#020617] mt-10 max-w-lg mx-auto transform rotate-1 animate-fade-in-up">
                    <h2 className="text-4xl md:text-5xl font-black text-amber-400 mb-6 uppercase tracking-widest drop-shadow-md">SIEG!</h2>
                    <div className="bg-slate-950 p-6 rounded-2xl border-4 border-slate-700 mb-8">
                      <p className="text-slate-400 font-bold text-lg uppercase mb-2">Gesamtpunktzahl</p>
                      <p className="text-6xl font-black text-white">{score}</p>
                      <p className="text-rose-400 font-bold mt-4">Fehlversuche: {mistakes}</p>
                    </div>
                    <div className="space-y-4">
                      <Button onClick={startGame} variant="primary">Nochmal Spielen</Button>
                      <Button onClick={onBack} variant="secondary">Zurück zur Zentrale</Button>
                    </div>
                  </div>
                </ScreenWrapper>
              );
            }
          }

          const currentItem = queue[0];

          return (
            <div className="min-h-screen bg-slate-950 text-slate-100 font-sans p-3 md:p-6 flex flex-col relative overflow-hidden select-none">
              <div className="absolute inset-0 opacity-40" style={{ backgroundImage: 'radial-gradient(#ffffff 1px, transparent 1px)', backgroundSize: '30px 30px', backgroundPosition: '0 0' }}></div>
              
              {/* Top Bar */}
              <div className="flex justify-between items-center p-4 md:p-5 bg-slate-800 rounded-3xl border-4 border-slate-950 shadow-[8px_8px_0px_#020617] relative z-20">
                <div className="flex flex-col">
                  <span className="text-xs md:text-sm text-cyan-400 uppercase font-bold tracking-widest">Level {currentStage}/2</span>
                  <span className="text-xl md:text-2xl font-black text-white uppercase">{currentStage === 1 ? 'Hardware / Software' : 'Fachrichtungen'}</span>
                </div>
                
                <div className="flex flex-col items-end">
                  <span className="text-xs md:text-sm text-amber-400 uppercase font-bold tracking-widest">Score</span>
                  <span className="text-2xl md:text-3xl font-black text-emerald-400">{score}</span>
                </div>
              </div>

              {/* Main Game Area */}
              <div className="flex-1 flex flex-col items-center justify-center relative z-10 w-full max-w-4xl mx-auto px-4">
                
                <div className="mb-12 w-full">
                  <div className="flex justify-between items-center mb-4">
                    <p className="text-slate-300 font-bold text-xl uppercase tracking-widest">Was ist das?</p>
                    <div className="flex items-center gap-2">
                      <span className="text-slate-400 font-bold uppercase tracking-widest">Zeit:</span>
                      <span className={`text-2xl font-black ${timeLeft <= 2 ? 'text-rose-500 animate-pulse' : 'text-cyan-400'}`}>{timeLeft}s</span>
                    </div>
                  </div>
                  
                  {/* Timer Bar */}
                  <div className="w-full h-3 bg-slate-800 rounded-full border-2 border-slate-950 overflow-hidden mb-6">
                    <div 
                      className={`h-full transition-all duration-1000 ease-linear ${timeLeft > 2 ? 'bg-cyan-400' : 'bg-rose-500'}`} 
                      style={{ width: `${(timeLeft / (currentStage === 1 ? 5 : 10)) * 100}%` }}
                    ></div>
                  </div>

                  <div className={`bg-slate-900 p-10 md:p-16 rounded-[40px] border-4 transition-colors duration-300 shadow-[8px_8px_0px_#020617] text-center w-full transform ${feedback?.type === 'error' ? 'border-rose-500 bg-rose-950 rotate-2' : feedback?.type === 'success' ? 'border-emerald-500 bg-emerald-950 -rotate-2' : 'border-slate-700'}`}>
                     <h2 className="text-3xl md:text-6xl font-black text-white drop-shadow-lg" style={{ WebkitTextStroke: '1px #020617' }}>
                       {currentItem.text}

                       <p className={`absolute bottom-4 left-0 right-0 text-center font-black uppercase tracking-widest text-xl ${feedback.type === 'error' ? 'text-rose-400 animate-bounce' : 'text-emerald-400 animate-pulse'}`}>
                         {feedback.text}
                       </p>
                     )}
                  </div>
                  <p className="text-center text-slate-500 font-bold mt-4">Verbleibende Elemente: {queue.length}</p>
                </div>

                {/* Buttons Level 1 */}
                {currentStage === 1 && (
                  <div className="grid grid-cols-2 gap-4 w-full">
                    <button onClick={() => !feedback && handleSort('hw')} className="bg-cyan-400 hover:bg-cyan-300 text-slate-950 p-6 md:p-8 rounded-3xl border-4 border-slate-950 shadow-[0_6px_0_#020617] active:translate-y-[6px] active:shadow-none font-black text-2xl md:text-4xl uppercase transition-all">
                      Hardware
                    </button>
                    <button onClick={() => !feedback && handleSort('sw')} className="bg-emerald-400 hover:bg-emerald-300 text-slate-950 p-6 md:p-8 rounded-3xl border-4 border-slate-950 shadow-[0_6px_0_#020617] active:translate-y-[6px] active:shadow-none font-black text-2xl md:text-4xl uppercase transition-all">
                      Software
                    </button>
                  </div>
                )}

                {/* Buttons Level 2 */}
                {currentStage === 2 && (
                  <div className="grid grid-cols-1 md:grid-cols-3 gap-4 w-full">
                    <button onClick={() => !feedback && handleSort('theo')} className="bg-sky-500 hover:bg-sky-400 text-white p-6 md:p-8 rounded-3xl border-4 border-slate-950 shadow-[0_6px_0_#020617] active:translate-y-[6px] active:shadow-none font-black text-xl md:text-2xl uppercase transition-all">
                      Theoretische<br/>Informatik
                    </button>
                    <button onClick={() => !feedback && handleSort('tech')} className="bg-rose-500 hover:bg-rose-400 text-white p-6 md:p-8 rounded-3xl border-4 border-slate-950 shadow-[0_6px_0_#020617] active:translate-y-[6px] active:shadow-none font-black text-xl md:text-2xl uppercase transition-all">
                      Technische<br/>Informatik
                    </button>
                    <button onClick={() => !feedback && handleSort('prak')} className="bg-amber-400 hover:bg-amber-300 text-slate-950 p-6 md:p-8 rounded-3xl border-4 border-slate-950 shadow-[0_6px_0_#020617] active:translate-y-[6px] active:shadow-none font-black text-xl md:text-2xl uppercase transition-all">
                      Praktische<br/>Informatik
                    </button>
                  </div>
                )}
              </div>
            </div>
          );
        };

        // --- Teacher Tools Component ---
        const TeacherTools = ({ onCheat }) => {
          const [isOpen, setIsOpen] = useState(false);
          const [code, setCode] = useState("");

          const handleCheat = () => {
            onCheat(code.toLowerCase().trim());
            setCode("");
            setIsOpen(false);
          };

          return (
            <div className="fixed bottom-4 right-4 z-50">
              {isOpen ? (
                <div className="bg-slate-800 p-4 rounded-3xl border-4 border-slate-950 shadow-[8px_8px_0px_#020617] flex gap-3">
                  <input 
                    type="text" 
                    value={code} 
                    onChange={(e) => setCode(e.target.value)} 
                    placeholder="Kommando..." 
                    className="bg-slate-900 text-cyan-400 p-3 rounded-xl text-lg outline-none w-40 font-mono font-bold border-4 border-slate-700 focus:border-fuchsia-500"
                  />
                  <button onClick={handleCheat} className="bg-fuchsia-500 hover:bg-fuchsia-400 text-white px-5 py-3 rounded-xl text-lg font-black border-4 border-slate-950 shadow-[0_4px_0_#020617] active:translate-y-[4px] active:shadow-none">EXE</button>
                  <button onClick={() => setIsOpen(false)} className="bg-rose-500 hover:bg-rose-400 text-white px-5 py-3 rounded-xl text-lg font-black border-4 border-slate-950 shadow-[0_4px_0_#020617] active:translate-y-[4px] active:shadow-none">X</button>
                </div>
              ) : (
                <button onClick={() => setIsOpen(true)} className="w-12 h-12 rounded-full bg-slate-800 border-4 border-slate-950 text-slate-500 hover:text-cyan-400 hover:bg-slate-900 flex items-center justify-center text-xl font-black opacity-50 hover:opacity-100 transition-all shadow-[0_4px_0_#020617] active:translate-y-[4px] active:shadow-none">
                  T
                </button>
              )}
            </div>
          );
        };

        // --- Main App Component ---
        const App = () => {
          const [view, setView] = useState('welcome'); 
          const [gameMode, setGameMode] = useState(1); 
          const [agentNames, setAgentNames] = useState(["", ""]);
          const [activeLevelId, setActiveLevelId] = useState(null);
          const [maxUnlocked, setMaxUnlocked] = useState(1);
          const [levelStates, setLevelStates] = useState({});
          const [triggerSolution, setTriggerSolution] = useState(false);

          const t = (single, plural) => gameMode === 1 ? single : plural;

          const updateLevelState = (levelId, newState) => {
            setLevelStates(prev => ({ ...prev, [levelId]: { ...prev[levelId], ...newState } }));
          };

          const handleCompleteLevel = (id) => {
            if (id >= maxUnlocked && id < 6) {
              setMaxUnlocked(id + 1);
            }
            setView('overview');
          };

          const processCheat = (code) => {
            if (code === "loesung") {
              setTriggerSolution(true);
              setTimeout(() => setTriggerSolution(false), 500);
            } else if (code === "warp") {
              if (activeLevelId && activeLevelId < 6) {
                setMaxUnlocked(Math.max(maxUnlocked, activeLevelId + 1));
                setView('overview');
              }
            } else if (code === "allesfrei") {
              setMaxUnlocked(6);
            } else {
              alert("FEHLER: Befehl unbekannt.");
            }
          };

          const renderCurrentView = () => {
            if (view === 'welcome') return <SetupScreen onStart={(mode, names) => { setGameMode(mode); setAgentNames(names); setView('overview'); }} />;
            if (view === 'overview') return <OverviewScreen maxUnlocked={maxUnlocked} onSelectLevel={(id) => { setActiveLevelId(id); setView('level'); }} gameMode={gameMode} agentNames={agentNames} />;
            
            const state = levelStates[activeLevelId] || {};
            const updater = (newState) => updateLevelState(activeLevelId, newState);
            const goBack = () => setView('overview');
            const complete = () => handleCompleteLevel(activeLevelId);

            const props = { state, updateState: updater, onBack: goBack, onComplete: complete, showSolution: triggerSolution, gameMode, t, agentNames };

            switch (activeLevelId) {
              case 1: return <Level1 {...props} />;
              case 2: return <Level2 {...props} />;
              case 3: return <Level3 {...props} />;
              case 4: return <Level4 {...props} />;
              case 5: return <Level5 {...props} />;
              case 6: return <Minigame onBack={goBack} gameMode={gameMode} agentNames={agentNames} />;
              default: return null;
            }
          };

          return (
            <div className="bg-slate-950 min-h-screen relative overflow-hidden">
              {renderCurrentView()}
              <TeacherTools onCheat={processCheat} />
            </div>
          );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
